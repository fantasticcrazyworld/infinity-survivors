const ENEMY_TYPES = {
  slime:  { color:'#44cc44', speed:50, hp:25, size:14, xp:1, dmg:7 },
  bat:    { color:'#aa44ff', speed:95, hp:18, size:12, xp:2, dmg:10 },
  golem:  { color:'#888888', speed:30, hp:100, size:20, xp:5, dmg:18 },
  wraith: { color:'#ff4444', speed:85, hp:70, size:16, xp:8, dmg:15 }
};

// ---- GAME ----
let game = null;

class Game {
  constructor() {
    this.state = 'title';
    this.time = 0; this.stageTime = 0; this.kills = 0; this.stageKills = 0; this.totalKills = 0;
    this.player = null;
    this.enemies = []; this.projectiles = []; this.particles = [];
    this.xpGems = []; this.damageNumbers = []; this.envParticles = [];
    this.camera = { x:0, y:0, shake:0 };
    this.keys = {};
    this.touch = { active:false, dx:0, dy:0, sx:0, sy:0 };
    this.spawnTimer = 0;
    this.currentStage = 0;
    this.stageDef = STAGES[0];
    this.bossSpawned = false; this.bossAlive = false; this.bossRef = null;
    this.objectives = { kills: false, time: false, boss: false };
    this.levelupChoices = [];
    this.trails = [];
    // Juice systems
    this.combo = 0;
    this.comboTimer = 0;
    this.maxCombo = 0;
    this.comboFrozen = false;
    this.hitstop = 0;
    this.camZoom = 1;
    this.camZoomTarget = 1;
    this.announcements = [];
    this.killBurst = 0; // screen-wide kill flash
    this.slowmo = 0; // slow motion timer
  }

  init() {
    this.player = {
      x: WORLD_SIZE/2, y: WORLD_SIZE/2,
      hp: 100, maxHp: 100, speed: 150,
      xp: 0, level: 1, xpToNext: 10,
      weapons: {}, passives: { speed:0, maxHp:0, magnet:0, cooldown:0 },
      invincible: 0, pickupRange: 50, facing: 0, bobTimer: 0,
      sp: 0, spMax: 100, ultReady: false
    };
    this.addWeapon('magicBullet');
    this.enemies = []; this.projectiles = []; this.particles = [];
    this.xpGems = []; this.damageNumbers = []; this.envParticles = [];
    this.trails = [];
    this.time = 0; this.kills = 0; this.totalKills = 0;
    this.camera.shake = 0;
    this.combo = 0; this.comboTimer = 0; this.maxCombo = 0; this.comboFrozen = false;
    this.hitstop = 0; this.camZoom = 1; this.camZoomTarget = 1;
    this.killBurst = 0; this.slowmo = 0;
    this.currentStage = 0;
    this.startStage(0);
  }

  startStage(idx) {
    this.currentStage = idx;
    this.stageDef = STAGES[idx];
    this.stageTime = 0;
    this.stageKills = 0;
    this.bossSpawned = false;
    this.bossAlive = false;
    this.bossRef = null;
    this.objectives = { kills: false, time: false, boss: false };
    this.enemies = [];
    this.projectiles = [];
    this.xpGems = [];
    this.spawnTimer = 0;
    // Freeze combo timer until first kill in new stage
    this.comboFrozen = true;

    // Center player
    this.player.x = WORLD_SIZE/2;
    this.player.y = WORLD_SIZE/2;

    // Spawn env particles
    this.envParticles = [];
    const envCount = isMobile ? 15 : 40;
    for (let i = 0; i < envCount; i++) this.spawnEnvParticle(true);

    // Show stage intro
    this.showStageIntro();
  }

  showStageIntro() {
    this.state = 'stageIntro';
    const s = this.stageDef;
    document.getElementById('stage-intro-number').textContent = `STAGE ${s.id}`;
    document.getElementById('stage-intro-name').textContent = s.name;
    document.getElementById('stage-intro-name').style.color = s.accent;
    const goals = [];
    if (s.killGoal) goals.push(`Defeat ${s.killGoal} enemies`);
    if (s.timeGoal) goals.push(`Survive ${Math.floor(s.timeGoal/60)}:${(s.timeGoal%60).toString().padStart(2,'0')}`);
    goals.push(`Defeat the boss: ${s.boss.name}`);
    document.getElementById('stage-intro-goal').textContent = goals.join('  |  ');
    document.getElementById('stage-intro').classList.add('active');
    audio.play('bossIntro', 0.3);
    setTimeout(() => {
      document.getElementById('stage-intro').classList.remove('active');
      this.state = 'playing';
    }, 2500);
  }

  addWeapon(type) {
    if (this.player.weapons[type]) this.player.weapons[type].level++;
    else this.player.weapons[type] = { level:1, cooldownTimer:0, data:{} };
  }

  getEffCd(base) { return base * Math.max(0.3, 1 - this.player.passives.cooldown * 0.10); }

  start() {
    this.state = 'playing';
    this.init();
    document.getElementById('title-screen').classList.add('hidden');
    document.getElementById('gameover-screen').classList.remove('active');
    document.getElementById('victory-screen').classList.remove('active');
    audio.init();
  }

  // ---- Spawning ----
  spawnEnemy() {
    const p = this.player;
    const a = rand(0, Math.PI*2);
    const d = 500 + rand(0,200);
    const x = p.x + Math.cos(a)*d, y = p.y + Math.sin(a)*d;
    const stg = this.stageDef;
    const minute = this.stageTime / 60;
    const r = Math.random();
    let type;
    if (minute < 0.5) type = 'slime';
    else if (minute < 1.5) type = r<0.6 ? 'slime' : 'bat';
    else if (minute < 3) type = r<0.3 ? 'slime' : r<0.6 ? 'bat' : r<0.85 ? 'golem' : 'wraith';
    else type = r<0.15 ? 'slime' : r<0.35 ? 'bat' : r<0.6 ? 'golem' : 'wraith';

    const def = ENEMY_TYPES[type];
    const sc = stg.enemyScale * (1 + minute * 0.1);
    this.enemies.push({
      x, y, type,
      hp: def.hp * sc, maxHp: def.hp * sc,
      speed: def.speed * (1 + this.currentStage * 0.1),
      size: def.size, xp: def.xp + this.currentStage,
      dmg: def.dmg * (1 + this.currentStage * 0.15),
      color: def.color, slowTimer: 0, hitFlash: 0,
      spawnAnim: 0.3, isBoss: false
    });
  }

  spawnStageBoss() {
    if (this.bossSpawned) return;
    this.bossSpawned = true;
    this.bossAlive = true;
    const p = this.player;
    const b = this.stageDef.boss;
    const a = rand(0, Math.PI*2);
    const boss = {
      x: p.x + Math.cos(a)*500, y: p.y + Math.sin(a)*500,
      type: 'boss', hp: b.hp, maxHp: b.hp,
      speed: b.speed, size: b.size, xp: 30 + this.currentStage*20,
      dmg: b.dmg, color: b.color, accent: b.accent,
      slowTimer: 0, hitFlash: 0, spawnAnim: 1.0,
      isBoss: true, bossName: b.name,
      phaseTimer: 0
    };
    this.enemies.push(boss);
    this.bossRef = boss;

    // Boss intro
    audio.play('boss', 0.5);
    vib([100,50,100,50,200]); // boss appear
    screenFlash('rgba(255,0,0,0.3)', 500);

    document.getElementById('boss-hp-container').classList.add('active');
    document.getElementById('boss-name').textContent = b.name;
    document.getElementById('boss-name').style.color = b.color;
  }

  checkObjectives() {
    const s = this.stageDef;
    if (s.killGoal && this.stageKills >= s.killGoal) this.objectives.kills = true;
    if (s.timeGoal && this.stageTime >= s.timeGoal) this.objectives.time = true;

    // Check if we should spawn boss
    const killOk = !s.killGoal || this.objectives.kills;
    const timeOk = !s.timeGoal || this.objectives.time;
    if (killOk && timeOk && !this.bossSpawned) {
      this.spawnStageBoss();
    }
  }

  stageClear() {
    this.state = 'stageClear';
    this.objectives.boss = true;
    document.getElementById('boss-hp-container').classList.remove('active');
    audio.play('clear', 0.5);
    vib([50,30,50,30,50,30,200]); // stage clear celebration
    screenFlash('rgba(255,255,200,0.5)', 800);

    // Celebration particles
    for (let i = 0; i < 60; i++) {
      const a = rand(0, Math.PI*2);
      addParticle(this.particles,{
        x: this.player.x, y: this.player.y,
        vx: Math.cos(a)*rand(100,400), vy: Math.sin(a)*rand(100,400),
        life: rand(0.5,1.5), maxLife: 1.5,
        size: rand(3,8), color: ['#ffdd00','#ff8800','#44ff44','#00ccff','#ff44ff'][randInt(0,4)]
      });
    }

    const stats = `Stage ${this.stageDef.id}: ${this.stageDef.name}<br>Kills: ${this.stageKills}<br>Time: ${this.formatTime(this.stageTime)}<br>Level: ${this.player.level}`;
    document.getElementById('clear-stats').innerHTML = stats;

    if (this.currentStage >= STAGES.length - 1) {
      // Victory!
      setTimeout(() => {
        document.getElementById('stage-clear').classList.remove('active');
        this.showVictory();
      }, 1500);
    } else {
      document.getElementById('next-stage-btn').textContent = 'NEXT STAGE';
    }
    document.getElementById('stage-clear').classList.add('active');
  }

  // ---- ULTIMATE ABILITY ----
  fireUltimate() {
    const p = this.player;
    if (!p.ultReady || this.state !== 'playing') return;
    p.sp = 0;
    p.ultReady = false;
    p.invincible = 2.0; // invincible during ult

    // Slow-mo for dramatic effect
    this.slowmo = 1.5;

    audio.play('explosion', 0.6);
    vib([50,30,50,30,200]);
    screenFlash('rgba(255,255,100,0.5)', 600);

    // 3 waves of damage, each more powerful
    const waves = [
      { delay: 0,   range: 200, dmg: 80,  color: '#ffdd00' },
      { delay: 300, range: 350, dmg: 120, color: '#ff8800' },
      { delay: 600, range: 500, dmg: 200, color: '#ff4400' },
    ];

    for (const wave of waves) {
      setTimeout(() => {
        if (this.state !== 'playing' && this.state !== 'paused') return;
        // Damage all enemies in range
        for (const e of [...this.enemies]) {
          if (dist(e, p) < wave.range) {
            this.damageEnemy(e, wave.dmg);
          }
        }
        // Expanding ring particles
        for (let i = 0; i < 36; i++) {
          const a = (i / 36) * Math.PI * 2;
          addParticle(this.particles, {
            x: p.x + Math.cos(a) * wave.range * 0.3,
            y: p.y + Math.sin(a) * wave.range * 0.3,
            vx: Math.cos(a) * wave.range * 2,
            vy: Math.sin(a) * wave.range * 2,
            life: 0.5, maxLife: 0.5,
            size: rand(4, 10), color: wave.color
          });
        }
        // Center burst
        for (let i = 0; i < 20; i++) {
          const a = rand(0, Math.PI * 2), spd = rand(100, 400);
          addParticle(this.particles, {
            x: p.x, y: p.y,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
            life: rand(0.3, 0.8), maxLife: 0.8,
            size: rand(3, 8), color: '#ffffff'
          });
        }
        screenFlash(`${wave.color}33`, 200);
        audio.play('explosion', 0.3);
        vib(40);
      }, wave.delay);
    }
  }

  showVictory() {
    this.state = 'victory';
    const score = calcScore(this);
    Storage.addScore({ name: Storage.getUser()||'???', score, stage: 5, time: this.formatTime(this.time), kills: this.totalKills, level: this.player.level, combo: this.maxCombo, date: new Date().toLocaleDateString() });
    document.getElementById('victory-stats').innerHTML =
      `All stages cleared!<br>Total Kills: ${this.totalKills}<br>Total Time: ${this.formatTime(this.time)}<br>Final Level: ${this.player.level}<br>Max Combo: ${this.maxCombo}<br><span style="color:#ffdd00;font-size:28px;font-family:Orbitron,sans-serif">SCORE: ${score}</span>`;
    document.getElementById('victory-screen').classList.add('active');
  }

  formatTime(t) { return `${Math.floor(t/60)}:${Math.floor(t%60).toString().padStart(2,'0')}`; }

  // ---- Environment Particles ----
  spawnEnvParticle(init = false) {
    const s = this.stageDef;
    const cx = this.player ? this.player.x : WORLD_SIZE/2;
    const cy = this.player ? this.player.y : WORLD_SIZE/2;
    const p = {
      x: cx + rand(-600, 600), y: init ? cy + rand(-400, 400) : cy - 450,
      life: rand(3, 8), maxLife: 8
    };
    switch(s.envType) {
      case 'leaf': p.vx = rand(-20,20); p.vy = rand(15,40); p.size = rand(3,6); p.rot = rand(0,6); break;
      case 'sand': p.vx = rand(20,60); p.vy = rand(-5,5); p.size = rand(1,3); break;
      case 'snow': p.vx = rand(-15,15); p.vy = rand(10,30); p.size = rand(2,5); break;
      case 'ember': p.vx = rand(-10,10); p.vy = rand(-40,-15); p.size = rand(2,4); break;
      case 'star': p.vx = rand(-5,5); p.vy = rand(-5,5); p.size = rand(1,3); p.twinkle = rand(0,6); break;
    }
    this.envParticles.push(p);
  }

  // ---- Update ----
  updatePlayer(dt) {
    const p = this.player;
    let dx=0, dy=0;
    if (this.keys['ArrowLeft']||this.keys['KeyA']) dx-=1;
    if (this.keys['ArrowRight']||this.keys['KeyD']) dx+=1;
    if (this.keys['ArrowUp']||this.keys['KeyW']) dy-=1;
    if (this.keys['ArrowDown']||this.keys['KeyS']) dy+=1;
    if (this.touch.active) { dx=this.touch.dx; dy=this.touch.dy; }
    const len = Math.hypot(dx,dy);
    if (len > 0) { dx/=len; dy/=len; p.facing=Math.atan2(dy,dx); }

    const spd = p.speed * (1 + p.passives.speed * 0.15);
    p.x += dx*spd*dt; p.y += dy*spd*dt;
    p.x = clamp(p.x, 50, WORLD_SIZE-50);
    p.y = clamp(p.y, 50, WORLD_SIZE-50);
    if (p.invincible > 0) p.invincible -= dt;
    p.pickupRange = 50 + p.passives.magnet * 40;
    p.bobTimer += dt;

    // Trail
    if (len > 0 && Math.random() < 0.4) {
      this.trails.push({ x:p.x, y:p.y+6, life:0.3, maxLife:0.3, size:rand(3,6) });
    }
  }

  updateEnemies(dt) {
    const p = this.player;
    for (let i = this.enemies.length-1; i >= 0; i--) {
      const e = this.enemies[i];
      if (e.spawnAnim > 0) { e.spawnAnim -= dt; continue; }
      const a = angle(e, p);
      const spd = e.slowTimer > 0 ? e.speed*0.3 : e.speed;
      e.x += Math.cos(a)*spd*dt;
      e.y += Math.sin(a)*spd*dt;
      if (e.slowTimer > 0) e.slowTimer -= dt;
      if (e.hitFlash > 0) e.hitFlash -= dt;
      if (e.isBoss) e.phaseTimer = (e.phaseTimer||0) + dt;

      const d = dist(e, p);
      if (d < e.size+12 && p.invincible <= 0) {
        p.hp -= e.dmg;
        p.invincible = 0.5;
        audio.play('playerHit', 0.4);
        vib(50); // player hit
        this.combo = 0; this.comboTimer = 0; // reset combo on damage
        this.spawnDmgNum(p.x, p.y-20, Math.round(e.dmg), '#ff4444');
        screenFlash('rgba(255,0,0,0.15)', 200);
        if (p.hp <= 0) { p.hp = 0; this.gameOver(); return; }
      }
      if (d > 1200 && !e.isBoss) this.enemies.splice(i, 1);
    }
  }

  updateWeapons(dt) {
    const p = this.player;
    for (const [type, w] of Object.entries(p.weapons)) {
      if (type === 'fireCircle') { this.updateFireCircle(w, dt); continue; }
      w.cooldownTimer -= dt*1000;
      if (w.cooldownTimer <= 0) {
        w.cooldownTimer = this.getEffCd(WEAPON_DEFS[type].baseCooldown);
        this.fireWeapon(type, w);
      }
    }
  }

  fireWeapon(type, w) {
    const p = this.player, lv = w.level;
    switch(type) {
      case 'magicBullet': {
        const ts = this.getClosest(lv);
        for (const t of ts) {
          const a = angle(p, t);
          this.projectiles.push({ x:p.x, y:p.y, vx:Math.cos(a)*300, vy:Math.sin(a)*300, dmg:15+lv*5, size:5, life:2, color:'#aa66ff', type:'bullet', pierce:0, homing:t });
        }
        if (ts.length) audio.play('hit', 0.15);
        break;
      }
      case 'lightning': {
        const ts = this.getClosest(lv, 300);
        for (const t of ts) {
          this.damageEnemy(t, 30+lv*10);
          for (let j=0;j<10;j++) addParticle(this.particles,{ x:t.x+rand(-20,20), y:t.y+rand(-40,0), vx:rand(-60,60), vy:rand(-120,-20), life:0.3, maxLife:0.3, size:rand(2,6), color:'#ffff44' });
        }
        if (ts.length) audio.play('lightning', 0.3);
        break;
      }
      case 'shuriken': {
        for (let i=0;i<lv;i++) {
          const a = p.facing + (i-(lv-1)/2)*0.3;
          this.projectiles.push({ x:p.x, y:p.y, vx:Math.cos(a)*500, vy:Math.sin(a)*500, dmg:12+lv*4, size:6, life:1.5, color:'#88ccff', type:'shuriken', pierce:lv, rotation:0 });
        }
        audio.play('hit', 0.15);
        break;
      }
      case 'frostNova': {
        const range = 80+lv*20, dmg = 20+lv*8;
        for (const e of this.enemies) { if (dist(e,p)<range) { this.damageEnemy(e,dmg); e.slowTimer=1+lv*0.5; } }
        for (let i=0;i<30;i++) { const a=(i/30)*Math.PI*2; addParticle(this.particles,{ x:p.x+Math.cos(a)*range*0.3, y:p.y+Math.sin(a)*range*0.3, vx:Math.cos(a)*range*1.5, vy:Math.sin(a)*range*1.5, life:0.5, maxLife:0.5, size:rand(3,8), color:'#aaeeff' }); }
        audio.play('explosion', 0.3);
        break;
      }
      case 'meteor': {
        for (let i=0;i<lv;i++) {
          const ts2 = this.enemies.filter(e=>dist(e,p)<400);
          const t = ts2.length ? ts2[randInt(0,ts2.length-1)] : null;
          const tx = t ? t.x+rand(-30,30) : p.x+rand(-200,200);
          const ty = t ? t.y+rand(-30,30) : p.y+rand(-200,200);
          const delay = 400+i*200;
          setTimeout(()=>{
            if(this.state!=='playing')return;
            const range=60+lv*10, dmg=50+lv*15;
            for(const e of this.enemies){if(dist(e,{x:tx,y:ty})<range)this.damageEnemy(e,dmg);}
            for(let j=0;j<25;j++){const a2=rand(0,Math.PI*2),spd2=rand(50,250);addParticle(this.particles,{x:tx,y:ty,vx:Math.cos(a2)*spd2,vy:Math.sin(a2)*spd2,life:0.7,maxLife:0.7,size:rand(3,12),color:rand(0,1)>0.5?'#ff6600':'#ffaa00'});}
            audio.play('explosion',0.4);
          }, delay);
          addParticle(this.particles,{x:tx,y:ty,vx:0,vy:0,life:delay/1000,maxLife:delay/1000,size:60+lv*10,color:'#ff440033',type:'warning'});
        }
        break;
      }
    }
  }

  updateFireCircle(w, dt) {
    const p = this.player, lv = w.level;
    const count = 2+lv, radius = 60+lv*10, dmg = 10+lv*3;
    if (!w.data.angle) w.data.angle = 0;
    w.data.angle += dt*3;
    if (!w.data.ht) w.data.ht = 0;
    w.data.ht -= dt;
    if (w.data.ht <= 0) {
      w.data.ht = 0.3;
      for (let i=0;i<count;i++) {
        const a = w.data.angle + (i/count)*Math.PI*2;
        const fx = p.x+Math.cos(a)*radius, fy = p.y+Math.sin(a)*radius;
        for (const e of this.enemies) { if(dist(e,{x:fx,y:fy})<e.size+15) this.damageEnemy(e,dmg); }
      }
    }
  }

  getClosest(n, maxD=500) {
    const p = this.player;
    return this.enemies.filter(e=>dist(e,p)<maxD && e.spawnAnim<=0).sort((a,b)=>dist(a,p)-dist(b,p)).slice(0,n);
  }

  damageEnemy(e, dmg) {
    e.hp -= dmg; e.hitFlash = 0.1;
    this.spawnDmgNum(e.x, e.y-e.size, Math.round(dmg), e.isBoss?'#ff8844':'#ffff00');
    // Hit sparks - flashy
    for(let i=0;i<6;i++) {
      const a=rand(0,Math.PI*2), spd=rand(60,180);
      addParticle(this.particles,{x:e.x+rand(-5,5),y:e.y+rand(-5,5),vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:0.2,maxLife:0.2,size:rand(2,5),color:i<3?'#fff':'#ffff88'});
    }
    if (e.isBoss) {
      document.getElementById('boss-hp-bar').style.width = Math.max(0,e.hp/e.maxHp*100)+'%';
    }
    if (e.hp <= 0) this.killEnemy(e);
  }

  killEnemy(e) {
    const idx = this.enemies.indexOf(e);
    if (idx===-1) return;
    this.enemies.splice(idx, 1);
    this.kills++; this.stageKills++; this.totalKills++;

    // === COMBO SYSTEM ===
    this.comboFrozen = false; // unfreeze on first kill
    this.combo++;
    this.comboTimer = 2.0; // 2 sec to keep combo

    // SP gauge charge (more SP from combos)
    const spGain = 3 + Math.min(this.combo * 0.5, 10) + (e.isBoss ? 30 : 0);
    this.player.sp = Math.min(this.player.sp + spGain, this.player.spMax);
    if (this.player.sp >= this.player.spMax && !this.player.ultReady) {
      this.player.ultReady = true;
      this.showAnnouncement('ULTIMATE READY!', '#ffdd00', 30);
      vib([30,20,30,20,60]);
    }
    if (this.combo > this.maxCombo) this.maxCombo = this.combo;

    // Combo milestones
    const milestones = [
      [10,  'NICE!',        '#44ff44', 24],
      [25,  'GREAT!',       '#44ddff', 28],
      [50,  'AMAZING!',     '#ffdd00', 32],
      [100, 'UNSTOPPABLE!', '#ff8800', 38],
      [200, 'GODLIKE!!',    '#ff44ff', 44],
      [500, 'LEGENDARY!!!', '#ff0000', 52],
    ];
    for (const [threshold, text, color, size] of milestones) {
      if (this.combo === threshold) {
        this.showAnnouncement(text, color, size);
        this.camZoomTarget = 1.08;
        setTimeout(() => { if(game) game.camZoomTarget = 1; }, 400);
        vib([40,20,40,20,80]);
        screenFlash(`${color}22`, 300);
        // Celebration ring
        for (let i=0;i<24;i++) {
          const a=(i/24)*Math.PI*2;
          addParticle(this.particles,{x:this.player.x+Math.cos(a)*60,y:this.player.y+Math.sin(a)*60,vx:Math.cos(a)*200,vy:Math.sin(a)*200,life:0.5,maxLife:0.5,size:rand(3,7),color});
        }
        break;
      }
    }

    // === HITSTOP (brief freeze on kill for impact) ===
    if (e.isBoss) {
      this.hitstop = 0.15; // longer for boss
      this.slowmo = 0.8;   // epic slow-mo
    } else if (this.combo > 0 && this.combo % 10 === 0) {
      this.hitstop = 0.04; // micro-freeze every 10 combo
    }

    // (camera shake on kill removed per user request)

    // === SCREEN KILL FLASH (subtle white) ===
    if (this.combo > 5) {
      this.killBurst = 0.06;
    }

    // XP
    this.xpGems.push({ x:e.x+rand(-10,10), y:e.y+rand(-10,10), xp:e.xp, size:Math.min(4+e.xp,12), color:e.xp>=10?'#ffdd00':'#44ddff', mag:false });

    // Death explosion - EXTRA FLASHY (scales with combo)
    const comboBonus = Math.min(this.combo * 0.3, 10);
    const count = e.isBoss ? 80 : Math.floor(18 + comboBonus);
    for (let i=0;i<count;i++) {
      const a = rand(0,Math.PI*2), spd = rand(60, e.isBoss?500:200+comboBonus*10);
      addParticle(this.particles,{ x:e.x, y:e.y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life:rand(0.3,1.2), maxLife:1.2, size:rand(2,e.isBoss?14:8+comboBonus*0.3), color:e.isBoss?e.accent:e.color });
    }
    // White flash particles
    for (let i=0;i<(e.isBoss?30:5+Math.floor(comboBonus));i++) {
      const a = rand(0,Math.PI*2), spd = rand(80, e.isBoss?400:150);
      addParticle(this.particles,{ x:e.x, y:e.y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life:rand(0.1,0.4), maxLife:0.4, size:rand(3,e.isBoss?12:5), color:'#ffffff' });
    }
    // Ring burst
    if (!e.isBoss) {
      for (let i=0;i<12;i++) {
        const a=(i/12)*Math.PI*2;
        addParticle(this.particles,{ x:e.x+Math.cos(a)*e.size, y:e.y+Math.sin(a)*e.size, vx:Math.cos(a)*120, vy:Math.sin(a)*120, life:0.25, maxLife:0.25, size:3, color:e.color });
      }
    }

    if (e.isBoss) {
      this.bossAlive = false;
      audio.play('explosion', 0.6);
      vib([100,30,100,30,300]);
      screenFlash('rgba(255,255,200,0.7)', 800);
      this.showAnnouncement('BOSS DEFEATED!', '#ffdd00', 48);
      document.getElementById('boss-hp-container').classList.remove('active');
      for (let i=0;i<20;i++) {
        this.xpGems.push({ x:e.x+rand(-50,50), y:e.y+rand(-50,50), xp:5+this.currentStage*3, size:10, color:'#ffdd00', mag:false });
      }
      setTimeout(() => this.stageClear(), 1500);
    } else {
      audio.play('kill', 0.12 + Math.min(this.combo*0.003, 0.15));
      // Pitch up kill sound with combo
      if (this.combo > 3) vib(15);
    }
  }

  showAnnouncement(text, color, size) {
    const el = document.getElementById('announcement');
    el.textContent = text;
    el.style.color = color;
    el.style.fontSize = size + 'px';
    el.style.textShadow = `0 0 30px ${color}88, 0 0 60px ${color}44`;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1200);
  }

  updateProjectiles(dt) {
    for (let i=this.projectiles.length-1;i>=0;i--) {
      const pr = this.projectiles[i];
      if (pr.homing && this.enemies.includes(pr.homing)) {
        const a = angle(pr,pr.homing), ca = Math.atan2(pr.vy,pr.vx);
        let diff = a-ca; while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
        const na = ca+clamp(diff,-5*dt,5*dt), sp = Math.hypot(pr.vx,pr.vy);
        pr.vx=Math.cos(na)*sp; pr.vy=Math.sin(na)*sp;
      }
      pr.x+=pr.vx*dt; pr.y+=pr.vy*dt; pr.life-=dt;
      if(pr.rotation!==undefined)pr.rotation+=dt*15;
      if(pr.life<=0){this.projectiles.splice(i,1);continue;}
      for(let j=this.enemies.length-1;j>=0;j--){
        const e=this.enemies[j];
        if(e.spawnAnim>0)continue;
        if(dist(pr,e)<pr.size+e.size){
          this.damageEnemy(e,pr.dmg);
          if(pr.pierce!==undefined&&pr.pierce>0)pr.pierce--;
          else{this.projectiles.splice(i,1);}
          break;
        }
      }
    }
  }

  updateXPGems(dt) {
    const p = this.player;
    for (let i=this.xpGems.length-1;i>=0;i--) {
      const g = this.xpGems[i];
      const d = dist(g,p);
      if(d<p.pickupRange||g.mag){g.mag=true;const a=angle(g,p);g.x+=Math.cos(a)*400*dt;g.y+=Math.sin(a)*400*dt;}
      if(d<15){
        p.xp+=g.xp; this.xpGems.splice(i,1);
        audio.play('xp',0.08);
        // Sparkle
        for(let j=0;j<3;j++) addParticle(this.particles,{x:g.x,y:g.y,vx:rand(-40,40),vy:rand(-60,-20),life:0.3,maxLife:0.3,size:rand(1,3),color:g.color});
        while(p.xp>=p.xpToNext){
          p.xp-=p.xpToNext; p.level++;
          p.xpToNext=Math.floor(10+p.level*5+p.level*p.level*0.5);
          this.triggerLevelUp();
        }
      }
    }
  }

  updateParticles(dt) {
    for(let i=this.particles.length-1;i>=0;i--){const p=this.particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)this.particles.splice(i,1);}
    for(let i=this.damageNumbers.length-1;i>=0;i--){const d=this.damageNumbers[i];d.y-=45*dt;d.life-=dt;if(d.life<=0)this.damageNumbers.splice(i,1);}
    for(let i=this.trails.length-1;i>=0;i--){this.trails[i].life-=dt;if(this.trails[i].life<=0)this.trails.splice(i,1);}
    // Env particles
    for(let i=this.envParticles.length-1;i>=0;i--){
      const ep=this.envParticles[i];ep.x+=ep.vx*dt;ep.y+=ep.vy*dt;ep.life-=dt;
      if(ep.twinkle!==undefined)ep.twinkle+=dt*3;
      if(ep.rot!==undefined)ep.rot+=dt*2;
      if(ep.life<=0){this.envParticles.splice(i,1);this.spawnEnvParticle();}
    }
  }

  spawnDmgNum(x, y, val, color) {
    if(this.damageNumbers.length < MAX_DMGNUMS) this.damageNumbers.push({x:x+rand(-10,10),y,value:val,color,life:0.8,maxLife:0.8});
  }

  triggerLevelUp() {
    this.state = 'levelup';
    audio.play('levelup', 0.4);
    vib([30,20,30]); // level up
    screenFlash('rgba(255,255,100,0.2)', 300);
    const pool = [];
    const owned = Object.keys(this.player.weapons);
    for (const w of owned) if(this.player.weapons[w].level<8) pool.push({type:'weapon',key:w,isNew:false});
    if (owned.length<6) for(const w of Object.keys(WEAPON_DEFS)) if(!owned.includes(w)) pool.push({type:'weapon',key:w,isNew:true});
    for (const [k,d] of Object.entries(PASSIVE_DEFS)) if(this.player.passives[k]<d.maxLv) pool.push({type:'passive',key:k});
    this.levelupChoices = [];
    for (let i=0;i<3&&pool.length;i++){const idx=randInt(0,pool.length-1);this.levelupChoices.push(pool.splice(idx,1)[0]);}
    this.showLevelUpUI();
  }

  showLevelUpUI() {
    document.getElementById('levelup-screen').classList.add('active');
    const el = document.getElementById('levelup-choices');
    el.innerHTML = '';
    for (let i=0;i<this.levelupChoices.length;i++) {
      const c = this.levelupChoices[i], card = document.createElement('div');
      card.className = 'choice-card';
      if (c.type==='weapon') {
        const def=WEAPON_DEFS[c.key],lv=c.isNew?1:this.player.weapons[c.key].level+1;
        card.innerHTML=`<div class="choice-icon">${def.icon}</div><div class="choice-name">${def.name}</div><div class="choice-level">${c.isNew?'NEW!':'Lv.'+lv}</div><div class="choice-desc">${c.isNew?def.desc:def.levelDesc(lv)}</div>`;
      } else {
        const def=PASSIVE_DEFS[c.key],lv=this.player.passives[c.key]+1;
        card.innerHTML=`<div class="choice-icon">${def.icon}</div><div class="choice-name">${def.name}</div><div class="choice-level">Lv.${lv}</div><div class="choice-desc">${def.desc}</div>`;
      }
      card.onclick = () => this.selectLevelUp(i);
      el.appendChild(card);
    }
  }

  selectLevelUp(idx) {
    const c = this.levelupChoices[idx];
    if(c.type==='weapon') this.addWeapon(c.key);
    else { this.player.passives[c.key]++; if(c.key==='maxHp'){this.player.maxHp+=20;this.player.hp=Math.min(this.player.hp+20,this.player.maxHp);} }
    document.getElementById('levelup-screen').classList.remove('active');
    this.state = 'playing';
  }

  gameOver() {
    this.state = 'gameover';
    vib([200,100,400]);
    screenFlash('rgba(255,0,0,0.4)', 600);
    document.getElementById('boss-hp-container').classList.remove('active');
    const score = calcScore(this);
    Storage.addScore({ name: Storage.getUser()||'???', score, stage: this.currentStage+1, time: this.formatTime(this.time), kills: this.totalKills, level: this.player.level, combo: this.maxCombo, date: new Date().toLocaleDateString() });
    document.getElementById('gameover-stats').innerHTML =
      `Stage: ${this.stageDef.name}<br>Time: ${this.formatTime(this.time)}<br>Level: ${this.player.level}<br>Kills: ${this.totalKills}<br>Max Combo: ${this.maxCombo}<br><span style="color:#ffdd00;font-size:24px;font-family:Orbitron,sans-serif">SCORE: ${score}</span>`;
    document.getElementById('gameover-screen').classList.add('active');
  }

  // ---- Main Update ----
  update(dt) {
    if (this.state !== 'playing') return;

    // Hitstop: freeze game briefly for impact
    if (this.hitstop > 0) { this.hitstop -= dt; return; }

    // Slow motion
    let gameDt = dt;
    if (this.slowmo > 0) { this.slowmo -= dt; gameDt = dt * 0.3; }

    // Kill burst fade
    if (this.killBurst > 0) this.killBurst -= dt;

    this.time += gameDt; this.stageTime += gameDt;

    // Combo timer (frozen during stage transition until first kill)
    if (this.comboTimer > 0 && !this.comboFrozen) {
      this.comboTimer -= gameDt;
      if (this.comboTimer <= 0) { this.combo = 0; }
    }

    // Camera zoom lerp
    this.camZoom = lerp(this.camZoom, this.camZoomTarget, gameDt * 5);

    // Spawn
    const stg = this.stageDef;
    const minute = this.stageTime / 60;
    const rate = Math.max(0.08, (0.8 - minute*0.06)) / stg.spawnMul;
    this.spawnTimer -= gameDt;
    if (this.spawnTimer <= 0) {
      this.spawnTimer = rate;
      const batch = Math.floor(1 + minute*0.5);
      for (let i=0;i<batch;i++) if(this.enemies.length<MAX_ENEMIES) this.spawnEnemy();
    }

    this.updatePlayer(gameDt);
    this.updateEnemies(gameDt);
    this.updateWeapons(gameDt);
    this.updateProjectiles(gameDt);
    this.updateXPGems(gameDt);
    this.updateParticles(gameDt);
    this.checkObjectives();

    // Camera
    this.camera.x = this.player.x - canvas.width / 2 / this.camZoom;
    this.camera.y = this.player.y - canvas.height / 2 / this.camZoom;
    if (this.camera.shake > 0) {
      this.camera.x += rand(-this.camera.shake, this.camera.shake);
      this.camera.y += rand(-this.camera.shake, this.camera.shake);
      this.camera.shake *= 0.86;
      if (this.camera.shake < 0.5) this.camera.shake = 0;
    }
    this.updateUI();
    this.updateComboUI();
  }

  updateComboUI() {
    const ce = document.getElementById('combo-count');
    const cl = document.getElementById('combo-label');
    if (this.combo >= 3) {
      ce.textContent = this.combo;
      ce.classList.add('active');
      cl.classList.add('active');
      // Pop effect
      ce.classList.add('pop');
      setTimeout(() => ce.classList.remove('pop'), 80);
      // Color escalation
      if (this.combo >= 200) { ce.style.color = '#ff44ff'; cl.style.color = '#ff44ff'; }
      else if (this.combo >= 100) { ce.style.color = '#ff8800'; cl.style.color = '#ff6600'; }
      else if (this.combo >= 50) { ce.style.color = '#ffdd00'; cl.style.color = '#ffaa00'; }
      else if (this.combo >= 25) { ce.style.color = '#44ddff'; cl.style.color = '#44aadd'; }
      else { ce.style.color = '#ffdd00'; cl.style.color = '#ffaa00'; }
    } else {
      ce.classList.remove('active');
      cl.classList.remove('active');
    }
  }

  updateUI() {
    const p = this.player, s = this.stageDef;
    document.getElementById('hp-bar').style.width = (p.hp/p.maxHp*100)+'%';
    document.getElementById('hp-text').textContent = `${Math.ceil(p.hp)} / ${p.maxHp}`;
    document.getElementById('xp-bar').style.width = (p.xp/p.xpToNext*100)+'%';
    document.getElementById('hud-level').textContent = `Lv.${p.level}`;
    document.getElementById('hud-kills').textContent = `Kills: ${this.stageKills}`;
    document.getElementById('hud-time').textContent = this.formatTime(this.stageTime);
    document.getElementById('stage-name').textContent = `STAGE ${s.id} - ${s.name}`;
    document.getElementById('stage-name').style.color = s.accent;

    // Objectives
    const objEl = document.getElementById('objectives');
    objEl.innerHTML = '';
    if (s.killGoal) { const d=document.createElement('div'); d.className='obj-item'+(this.objectives.kills?' completed':''); d.textContent=`${Math.min(this.stageKills,s.killGoal)}/${s.killGoal} Kills`; objEl.appendChild(d); }
    if (s.timeGoal) { const d=document.createElement('div'); d.className='obj-item'+(this.objectives.time?' completed':''); d.textContent=`${this.formatTime(Math.min(this.stageTime,s.timeGoal))}/${this.formatTime(s.timeGoal)} Survive`; objEl.appendChild(d); }
    { const d=document.createElement('div'); d.className='obj-item'+(this.objectives.boss?' completed':''); d.textContent=this.bossSpawned?(this.objectives.boss?'Boss Defeated':'Defeat Boss'):'Boss Locked'; objEl.appendChild(d); }

    // Weapon inv
    const inv = document.getElementById('weapon-inventory');
    inv.innerHTML = '';
    for (const [t,w] of Object.entries(p.weapons)) {
      const def=WEAPON_DEFS[t], slot=document.createElement('div');
      slot.className='weapon-slot'; slot.innerHTML=`${def.icon}<span class="wlvl">${w.level}</span>`;
      inv.appendChild(slot);
    }

    // SP gauge
    const spPct = (p.sp / p.spMax * 100);
    const spBar = document.getElementById('sp-bar');
    spBar.style.width = spPct + '%';
    if (p.ultReady) { spBar.classList.add('ready'); } else { spBar.classList.remove('ready'); }
    const spHint = document.getElementById('sp-hint');
    if (p.ultReady) { spHint.classList.add('show'); } else { spHint.classList.remove('show'); }
    const ultBtn = document.getElementById('ultimate-btn');
    if (p.ultReady && isMobile) { ultBtn.style.display = 'block'; } else { ultBtn.style.display = 'none'; }
  }

  // ---- RENDER ----
  render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();

    // Camera zoom
    if (this.camZoom !== 1) {
      ctx.translate(canvas.width/2, canvas.height/2);
      ctx.scale(this.camZoom, this.camZoom);
      ctx.translate(-canvas.width/2, -canvas.height/2);
    }

    ctx.translate(-this.camera.x, -this.camera.y);
    this.drawBg();
    this.drawEnvParticles();
    this.drawTrails();
    this.drawXPGems();
    this.drawEnemies();
    this.drawPlayer();
    this.drawFireCircle();
    this.drawProjectiles();
    this.drawParticles();
    this.drawDmgNums();
    ctx.restore();

    // Kill burst overlay (white flash on rapid kills)
    if (this.killBurst > 0) {
      ctx.fillStyle = `rgba(255,255,255,${this.killBurst * 2})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Slow-mo vignette (skip on mobile)
    if (this.slowmo > 0 && !isMobile) {
      const vig = ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.width*0.3,canvas.width/2,canvas.height/2,canvas.width*0.7);
      vig.addColorStop(0,'transparent');
      vig.addColorStop(1,`rgba(0,0,0,${Math.min(this.slowmo,0.3)})`);
      ctx.fillStyle = vig;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
  }

  drawBg() {
    const s = this.stageDef, cam = this.camera;
    const sx = Math.floor(cam.x/TILE)*TILE, sy = Math.floor(cam.y/TILE)*TILE;
    const ex = sx+canvas.width+TILE*2, ey = sy+canvas.height+TILE*2;
    ctx.fillStyle = s.bg;
    ctx.fillRect(sx, sy, ex-sx, ey-sy);
    // Grid
    ctx.strokeStyle = s.grid; ctx.lineWidth = 1;
    for (let x=sx;x<ex;x+=TILE){ctx.beginPath();ctx.moveTo(x,sy);ctx.lineTo(x,ey);ctx.stroke();}
    for (let y=sy;y<ey;y+=TILE){ctx.beginPath();ctx.moveTo(sx,y);ctx.lineTo(ex,y);ctx.stroke();}
    // Decorative tiles
    for (let x=sx;x<ex;x+=TILE*3) for(let y=sy;y<ey;y+=TILE*3) {
      const hash = ((x*73+y*137)&0xff)/255;
      if (hash > 0.7) {
        ctx.fillStyle = s.tile;
        ctx.globalAlpha = 0.3;
        ctx.beginPath(); ctx.arc(x+TILE/2,y+TILE/2, 8+hash*12, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    // World boundary glow
    ctx.strokeStyle = s.accent + '44';
    ctx.lineWidth = 3;
    ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
    ctx.strokeStyle = s.accent + '22';
    ctx.lineWidth = 8;
    ctx.strokeRect(-4, -4, WORLD_SIZE+8, WORLD_SIZE+8);
  }

  drawEnvParticles() {
    const s = this.stageDef;
    for (const ep of this.envParticles) {
      const alpha = clamp(ep.life/ep.maxLife, 0, 1);
      ctx.globalAlpha = alpha * 0.5;
      ctx.fillStyle = s.envColor;
      if (s.envType === 'leaf') {
        ctx.save(); ctx.translate(ep.x, ep.y); ctx.rotate(ep.rot||0);
        ctx.fillStyle = s.accent + '66';
        ctx.beginPath(); ctx.ellipse(0,0,ep.size,ep.size*0.4,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      } else if (s.envType === 'star') {
        const tw = ep.twinkle ? Math.sin(ep.twinkle)*0.5+0.5 : 1;
        ctx.globalAlpha = alpha * tw * 0.8;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(ep.x,ep.y,ep.size*tw,0,Math.PI*2); ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(ep.x,ep.y,ep.size,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  drawTrails() {
    for (const t of this.trails) {
      const a = t.life / t.maxLife;
      ctx.globalAlpha = a * 0.3;
      ctx.fillStyle = '#4488ff';
      ctx.beginPath(); ctx.arc(t.x,t.y,t.size*a,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  drawPlayer() {
    const p = this.player;
    const flash = p.invincible > 0 && Math.sin(p.invincible*30) > 0;
    const bob = Math.sin(p.bobTimer * 3) * 3;
    const fa = p.facing;
    const dir = Math.cos(fa) >= 0 ? 1 : -1;
    const blink = Math.sin(p.bobTimer * 0.7) > 0.97; // occasional blink
    const breathe = Math.sin(p.bobTimer * 2) * 0.04 + 1; // breathing

    ctx.save(); ctx.translate(p.x, p.y + bob);

    if (!flash) {
      // Magic aura (soft glow) - skip on mobile
      if (!isMobile) {
        const aura = ctx.createRadialGradient(0,0,12,0,0,45);
        aura.addColorStop(0, 'rgba(120,180,255,0.15)');
        aura.addColorStop(0.5, 'rgba(180,120,255,0.06)');
        aura.addColorStop(1, 'rgba(120,180,255,0)');
        ctx.fillStyle = aura;
        ctx.beginPath(); ctx.arc(0,0,45,0,Math.PI*2); ctx.fill();
      }

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(0,20-bob,18,6,0,0,Math.PI*2); ctx.fill();

      // Scarf / Muffler (behind body)
      const sw = Math.sin(p.bobTimer*4)*4;
      ctx.fillStyle = '#ff6688';
      // Left tail
      ctx.beginPath();
      ctx.moveTo(-10,-2);
      ctx.quadraticCurveTo(-18+sw,8,-22+sw*1.5,18);
      ctx.quadraticCurveTo(-20+sw,20,-16+sw,16);
      ctx.quadraticCurveTo(-14+sw*0.5,6,-8,0);
      ctx.closePath(); ctx.fill();
      // Right tail
      ctx.beginPath();
      ctx.moveTo(10,-2);
      ctx.quadraticCurveTo(16-sw*0.5,10,20-sw,22);
      ctx.quadraticCurveTo(22-sw,24,18-sw*0.5,20);
      ctx.quadraticCurveTo(14-sw*0.3,8,8,0);
      ctx.closePath(); ctx.fill();
      // Scarf highlight
      ctx.fillStyle = '#ff88aa44';
      ctx.beginPath();
      ctx.moveTo(-10,-2);
      ctx.quadraticCurveTo(-16+sw,4,-18+sw*1.2,10);
      ctx.quadraticCurveTo(-14+sw,6,-8,0);
      ctx.closePath(); ctx.fill();

      // Round fluffy body
      const R = 16 * breathe;
      if (isMobile) {
        ctx.fillStyle = '#5599ee';
      } else {
        const bodyG = ctx.createRadialGradient(-4,-4,3,0,0,R);
        bodyG.addColorStop(0, '#aaddff');
        bodyG.addColorStop(0.4, '#77bbff');
        bodyG.addColorStop(0.8, '#4499ee');
        bodyG.addColorStop(1, '#3377cc');
        ctx.fillStyle = bodyG;
      }
      ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.fill();

      // Fluffy texture (lighter patches)
      ctx.fillStyle = 'rgba(200,230,255,0.2)';
      ctx.beginPath(); ctx.ellipse(-5,-6,8,5,-0.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6,3,5,4,0.5,0,Math.PI*2); ctx.fill();

      // Scarf wrap (front)
      ctx.fillStyle = '#ff6688';
      ctx.beginPath();
      ctx.ellipse(0,-R*0.55,R*0.75,5,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ff88aa';
      ctx.beginPath();
      ctx.ellipse(0,-R*0.55,R*0.75,3,-0.1,Math.PI,Math.PI*2);
      ctx.fill();

      // Ears (pointy cat-like)
      // Left ear
      ctx.fillStyle = '#4499ee';
      ctx.beginPath();
      ctx.moveTo(-8,-R*0.7);
      ctx.quadraticCurveTo(-14,-R*1.5,-4,-R*0.9);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffaacc';
      ctx.beginPath();
      ctx.moveTo(-7,-R*0.75);
      ctx.quadraticCurveTo(-12,-R*1.35,-5,-R*0.9);
      ctx.closePath(); ctx.fill();
      // Right ear
      ctx.fillStyle = '#4499ee';
      ctx.beginPath();
      ctx.moveTo(8,-R*0.7);
      ctx.quadraticCurveTo(14,-R*1.5,4,-R*0.9);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffaacc';
      ctx.beginPath();
      ctx.moveTo(7,-R*0.75);
      ctx.quadraticCurveTo(12,-R*1.35,5,-R*0.9);
      ctx.closePath(); ctx.fill();

      // Eyes
      const ex = Math.cos(fa)*2;
      const ey = Math.sin(fa)*1;
      if (blink) {
        // Blinking - happy lines
        ctx.strokeStyle = '#112';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(-5+ex,-4+ey,3,Math.PI*0.2,Math.PI*0.8); ctx.stroke();
        ctx.beginPath(); ctx.arc(5+ex,-4+ey,3,Math.PI*0.2,Math.PI*0.8); ctx.stroke();
      } else {
        // Big sparkly eyes
        // White
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(-5+ex,-4+ey,5,6,0,0,Math.PI*2);
        ctx.ellipse(5+ex,-4+ey,5,6,0,0,Math.PI*2);
        ctx.fill();
        // Iris
        ctx.fillStyle = '#1144aa';
        ctx.beginPath();
        ctx.arc(-5+ex+Math.cos(fa)*1.5,-4+ey+Math.sin(fa)*0.5,3.5,0,Math.PI*2);
        ctx.arc(5+ex+Math.cos(fa)*1.5,-4+ey+Math.sin(fa)*0.5,3.5,0,Math.PI*2);
        ctx.fill();
        // Pupil
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(-5+ex+Math.cos(fa)*2,-4+ey+Math.sin(fa)*0.8,1.8,0,Math.PI*2);
        ctx.arc(5+ex+Math.cos(fa)*2,-4+ey+Math.sin(fa)*0.8,1.8,0,Math.PI*2);
        ctx.fill();
        // Sparkle (big)
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-6+ex,-5.5+ey,1.8,0,Math.PI*2);
        ctx.arc(4+ex,-5.5+ey,1.8,0,Math.PI*2);
        ctx.fill();
        // Sparkle (small)
        ctx.beginPath();
        ctx.arc(-4+ex,-2.5+ey,0.8,0,Math.PI*2);
        ctx.arc(6+ex,-2.5+ey,0.8,0,Math.PI*2);
        ctx.fill();
      }

      // Cute mouth
      ctx.strokeStyle = '#224';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(0+ex*0.5, 3+ey*0.3, 3, 0.1, Math.PI-0.1);
      ctx.stroke();

      // Blush cheeks
      ctx.fillStyle = 'rgba(255,100,150,0.25)';
      ctx.beginPath();
      ctx.ellipse(-10, 0, 4, 3, 0, 0, Math.PI*2);
      ctx.ellipse(10, 0, 4, 3, 0, 0, Math.PI*2);
      ctx.fill();

      // Small feet at bottom
      ctx.fillStyle = '#3388dd';
      ctx.beginPath(); ctx.ellipse(-6,R*0.85,4,3,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6,R*0.85,4,3,0,0,Math.PI*2); ctx.fill();

      // Magic sparkles around character
      const sparkTime = p.bobTimer * 2;
      for (let i = 0; i < 4; i++) {
        const sa = sparkTime + i * Math.PI * 0.5;
        const sr = 22 + Math.sin(sparkTime*2+i)*5;
        const sx = Math.cos(sa) * sr;
        const sy = Math.sin(sa) * sr * 0.6 - 5;
        const ss = (Math.sin(sparkTime*3+i*2)*0.5+0.5) * 2.5;
        if (ss > 0.5) {
          ctx.fillStyle = `rgba(255,255,200,${ss/2.5*0.6})`;
          // Star shape
          ctx.save(); ctx.translate(sx,sy); ctx.rotate(sparkTime+i);
          ctx.beginPath();
          for(let j=0;j<4;j++){const a2=(j/4)*Math.PI*2;ctx.moveTo(0,0);ctx.lineTo(Math.cos(a2)*ss,Math.sin(a2)*ss);ctx.lineTo(Math.cos(a2+0.3)*ss*0.3,Math.sin(a2+0.3)*ss*0.3);}
          ctx.fill();
          ctx.restore();
        }
      }
    }
    ctx.restore();
  }

  drawEnemies() {
    for (const e of this.enemies) {
      const alpha = e.spawnAnim > 0 ? 1 - e.spawnAnim / 0.3 : 1;
      const scale = e.spawnAnim > 0 ? 0.3 + 0.7 * alpha : 1;
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.scale(scale, scale);
      ctx.globalAlpha = alpha;

      const col = e.hitFlash > 0 ? '#ffffff' : e.color;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(0,e.size,e.size*0.7,e.size*0.25,0,0,Math.PI*2); ctx.fill();

      if (e.isBoss) {
        const pt = e.phaseTimer||0;
        const pulse = Math.sin(pt*3)*4;
        const S = e.size;
        // Aura rings (skip extra on mobile)
        for(let r=0;r<(isMobile?1:3);r++){
          ctx.strokeStyle=col+(r===0?'33':r===1?'22':'11');
          ctx.lineWidth=2;
          ctx.beginPath(); ctx.arc(0,0,S+10+r*12+pulse+Math.sin(pt*2+r)*5,0,Math.PI*2); ctx.stroke();
        }
        // Dark body
        ctx.fillStyle='#111';
        ctx.beginPath();
        for(let i=0;i<20;i++){const a=(i/20)*Math.PI*2+pt*0.3;const r2=i%2===0?S+pulse:S*0.8+pulse;ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);}
        ctx.closePath(); ctx.fill();
        // Color overlay
        ctx.fillStyle=col;
        ctx.beginPath();
        for(let i=0;i<20;i++){const a=(i/20)*Math.PI*2+pt*0.3;const r2=i%2===0?S*0.9+pulse:S*0.7+pulse;ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);}
        ctx.closePath(); ctx.fill();
        // Crown/horns
        ctx.fillStyle=col;
        ctx.beginPath(); ctx.moveTo(-S*0.3,-S*0.6); ctx.lineTo(-S*0.15,-S*1.1-pulse); ctx.lineTo(0,-S*0.6); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0,-S*0.6); ctx.lineTo(S*0.15,-S*1.1-pulse); ctx.lineTo(S*0.3,-S*0.6); ctx.fill();
        // Face plate
        ctx.fillStyle='#0008';
        ctx.beginPath(); ctx.ellipse(0,-S*0.15,S*0.45,S*0.35,0,0,Math.PI*2); ctx.fill();
        // Eyes - menacing
        const eg=Math.sin(pt*4)*0.1;
        ctx.fillStyle=e.accent||'#ff4444';
        ctx.beginPath(); ctx.ellipse(-S*0.18,-S*0.2,S*0.1,S*0.06+eg,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(S*0.18,-S*0.2,S*0.1,S*0.06+eg,0,0,Math.PI*2); ctx.fill();
                // Mouth
        ctx.strokeStyle=e.accent||'#ff4444';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(0,-S*0.05,S*0.15,0.2,Math.PI-0.2);ctx.stroke();
      } else if (e.type==='slime') {
        const sq = 1+Math.sin(this.time*5)*0.1;
        const S = e.size;
        // Slime body
        ctx.fillStyle=e.hitFlash>0?'#fff':col;
        ctx.beginPath();
        ctx.moveTo(-S*sq,S*0.2);
        ctx.quadraticCurveTo(-S*sq*1.05,-S*0.6/sq,0,-S*0.75/sq);
        ctx.quadraticCurveTo(S*sq*1.05,-S*0.6/sq,S*sq,S*0.2);
        ctx.quadraticCurveTo(S*sq*0.5,S*0.4,0,S*0.35);
        ctx.quadraticCurveTo(-S*sq*0.5,S*0.4,-S*sq,S*0.2);
        ctx.fill();
        // Shiny bubble
        ctx.fillStyle='rgba(255,255,255,0.35)';
        ctx.beginPath(); ctx.ellipse(-S*0.25,-S*0.25,S*0.25,S*0.18,-0.3,0,Math.PI*2); ctx.fill();
        // Eyes
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.ellipse(-S*0.25,-S*0.1,3,3.5,0,0,Math.PI*2); ctx.ellipse(S*0.25,-S*0.1,3,3.5,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#112';
        ctx.beginPath(); ctx.arc(-S*0.25,-S*0.1,1.5,0,Math.PI*2); ctx.arc(S*0.25,-S*0.1,1.5,0,Math.PI*2); ctx.fill();
        // Mouth
        ctx.strokeStyle='#22662244';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(0,S*0.05,S*0.15,0.3,Math.PI-0.3);ctx.stroke();
      } else if (e.type==='bat') {
        const S = e.size;
        const wing = Math.sin(this.time*14)*0.4;
        // Wings
        ctx.fillStyle=e.hitFlash>0?'#fff':col;
        // Left wing
        ctx.beginPath();
        ctx.moveTo(-3,0);
        ctx.quadraticCurveTo(-S*0.8,-S*(0.8+wing),-S*1.5,-S*(0.4+wing));
        ctx.quadraticCurveTo(-S*1.2,-S*(0.2+wing*0.5),-S*0.9,-S*(0.5+wing*0.8));
        ctx.quadraticCurveTo(-S*0.6,S*0.1,-S*0.3,S*0.2);
        ctx.closePath(); ctx.fill();
        // Right wing
        ctx.beginPath();
        ctx.moveTo(3,0);
        ctx.quadraticCurveTo(S*0.8,-S*(0.8+wing),S*1.5,-S*(0.4+wing));
        ctx.quadraticCurveTo(S*1.2,-S*(0.2+wing*0.5),S*0.9,-S*(0.5+wing*0.8));
        ctx.quadraticCurveTo(S*0.6,S*0.1,S*0.3,S*0.2);
        ctx.closePath(); ctx.fill();
        // Wing membrane detail
        ctx.strokeStyle=col+'88';ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(-3,-2);ctx.lineTo(-S*1.2,-S*(0.5+wing));ctx.stroke();
        ctx.beginPath();ctx.moveTo(3,-2);ctx.lineTo(S*1.2,-S*(0.5+wing));ctx.stroke();
        // Body
        ctx.fillStyle=e.hitFlash>0?'#fff':col;
        ctx.beginPath(); ctx.ellipse(0,0,S*0.45,S*0.55,0,0,Math.PI*2); ctx.fill();
        // Ears
        ctx.fillStyle=col;
        ctx.beginPath();ctx.moveTo(-S*0.3,-S*0.3);ctx.lineTo(-S*0.15,-S*0.8);ctx.lineTo(0,-S*0.3);ctx.fill();
        ctx.beginPath();ctx.moveTo(0,-S*0.3);ctx.lineTo(S*0.15,-S*0.8);ctx.lineTo(S*0.3,-S*0.3);ctx.fill();
        // Eyes
        ctx.fillStyle='#ff3333';
        ctx.beginPath(); ctx.ellipse(-S*0.15,-S*0.1,2,2.5,0,0,Math.PI*2); ctx.ellipse(S*0.15,-S*0.1,2,2.5,0,0,Math.PI*2); ctx.fill();
                // Fangs
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.moveTo(-2,S*0.15);ctx.lineTo(-1,S*0.35);ctx.lineTo(0,S*0.15);ctx.fill();
        ctx.beginPath();ctx.moveTo(0,S*0.15);ctx.lineTo(1,S*0.35);ctx.lineTo(2,S*0.15);ctx.fill();
      } else if (e.type==='golem') {
        const S = e.size;
        // Blocky stone body
        ctx.fillStyle=e.hitFlash>0?'#fff':'#777';
        // Legs
        ctx.fillRect(-S*0.7,S*0.3,S*0.5,S*0.6);
        ctx.fillRect(S*0.2,S*0.3,S*0.5,S*0.6);
        // Torso
        ctx.fillStyle=e.hitFlash>0?'#fff':'#999';
        ctx.fillRect(-S*0.8,-S*0.5,S*1.6,S*1.0);
        // Stone texture
        ctx.strokeStyle='#66666644';ctx.lineWidth=1;
        ctx.strokeRect(-S*0.5,-S*0.3,S*0.4,S*0.3);
        ctx.strokeRect(S*0.1,-S*0.2,S*0.5,S*0.4);
        // Shoulders
        ctx.fillStyle=e.hitFlash>0?'#fff':'#aaa';
        ctx.fillRect(-S*1.0,-S*0.5,S*0.3,S*0.5);
        ctx.fillRect(S*0.7,-S*0.5,S*0.3,S*0.5);
        // Arms
        ctx.fillStyle=e.hitFlash>0?'#fff':'#888';
        ctx.fillRect(-S*1.0,0,S*0.25,S*0.7);
        ctx.fillRect(S*0.75,0,S*0.25,S*0.7);
        // Head
        ctx.fillStyle=e.hitFlash>0?'#fff':'#aaa';
        ctx.fillRect(-S*0.5,-S*0.9,S*1.0,S*0.5);
        // Crack details
        ctx.strokeStyle='#55555566';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(-S*0.2,-S*0.8);ctx.lineTo(-S*0.3,-S*0.5);ctx.lineTo(-S*0.1,-S*0.5);ctx.stroke();
        // Glowing eyes
        ctx.fillStyle='#ffaa00';
        ctx.fillRect(-S*0.35,-S*0.75,S*0.2,S*0.1);
        ctx.fillRect(S*0.15,-S*0.75,S*0.2,S*0.1);
                // Rune on chest
        ctx.strokeStyle='#ffaa0066';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(0,-S*0.35);ctx.lineTo(-S*0.2,0);ctx.lineTo(0,S*0.15);ctx.lineTo(S*0.2,0);ctx.closePath();ctx.stroke();
      } else {
        // Wraith - ghostly floating figure
        const S = e.size;
        const wave = this.time*5;
        // Ghostly aura
        ctx.fillStyle=col+'22';
        ctx.beginPath();ctx.arc(0,-S*0.2,S*1.2+Math.sin(wave)*3,0,Math.PI*2);ctx.fill();
        // Hood/head
        ctx.fillStyle=e.hitFlash>0?'#fff':col;
        ctx.beginPath();
        ctx.moveTo(-S*0.6,-S*0.2);
        ctx.quadraticCurveTo(-S*0.7,-S*0.9,0,-S);
        ctx.quadraticCurveTo(S*0.7,-S*0.9,S*0.6,-S*0.2);
        ctx.closePath(); ctx.fill();
        // Flowing body
        ctx.beginPath();
        ctx.moveTo(-S*0.6,-S*0.2);
        for(let i=0;i<=8;i++){
          const px=-S*0.6+(S*1.2/8)*i;
          const py=S*0.4+Math.sin(i*1.5+wave)*S*0.2+Math.sin(i*3+wave*1.5)*S*0.1;
          ctx.lineTo(px,py);
        }
        ctx.lineTo(S*0.6,-S*0.2);
        ctx.closePath();ctx.fill();
        // Dark face void
        ctx.fillStyle='#000';
        ctx.beginPath();ctx.ellipse(0,-S*0.5,S*0.3,S*0.25,0,0,Math.PI*2);ctx.fill();
        // Glowing eyes
        ctx.fillStyle='#ff6666';
        ctx.beginPath();ctx.ellipse(-S*0.12,-S*0.52,2.5,1.5,0,0,Math.PI*2);ctx.ellipse(S*0.12,-S*0.52,2.5,1.5,0,0,Math.PI*2);ctx.fill();
                // Wispy trails (skip on mobile)
        if (!isMobile) {
          ctx.strokeStyle=col+'44';ctx.lineWidth=1;
          for(let t2=0;t2<2;t2++){
            ctx.beginPath();
            ctx.moveTo(Math.sin(wave+t2*3)*S*0.3,S*0.3);
            ctx.quadraticCurveTo(Math.cos(wave+t2*2)*S*0.4,S*0.5+Math.sin(wave+t2)*5,Math.sin(wave+t2)*S*0.2,S*0.7);
            ctx.stroke();
          }
        }
      }

      // Slow ring
      if (e.slowTimer > 0) {
        ctx.strokeStyle='#66ddff66'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0,0,e.size+4,0,Math.PI*2); ctx.stroke();
      }

      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  drawFireCircle() {
    const p = this.player, w = p.weapons.fireCircle;
    if (!w) return;
    const count=2+w.level, radius=60+w.level*10, base=w.data.angle||0;
    for (let i=0;i<count;i++) {
      const a = base+(i/count)*Math.PI*2;
      const fx=p.x+Math.cos(a)*radius, fy=p.y+Math.sin(a)*radius;
      if (!isMobile) {
        const g = ctx.createRadialGradient(fx,fy,2,fx,fy,20);
        g.addColorStop(0,'rgba(255,180,0,0.9)');
        g.addColorStop(0.4,'rgba(255,80,0,0.5)');
        g.addColorStop(1,'rgba(255,0,0,0)');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(fx,fy,20,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle='#ffcc33'; ctx.beginPath(); ctx.arc(fx,fy,7,0,Math.PI*2); ctx.fill();
    }
  }

  drawProjectiles() {
    for (const pr of this.projectiles) {
      ctx.save(); ctx.translate(pr.x,pr.y);
      if (pr.type==='shuriken'&&pr.rotation!==undefined) {
        ctx.rotate(pr.rotation);
        ctx.fillStyle=pr.color;
        ctx.beginPath();
        for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2,r=i%2===0?pr.size:pr.size*0.4;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
        ctx.closePath(); ctx.fill();
      } else {
        ctx.fillStyle=pr.color; ctx.beginPath(); ctx.arc(0,0,pr.size,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,pr.size*0.4,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
  }

  drawXPGems() {
    for (const g of this.xpGems) {
      ctx.save(); ctx.translate(g.x, g.y);
      const pulse = Math.sin(this.time*6+g.x)*0.15+1;
      // Glow
      ctx.fillStyle = g.color+'33';
      ctx.beginPath(); ctx.arc(0,0,(g.size+5)*pulse,0,Math.PI*2); ctx.fill();
      // Diamond
      ctx.fillStyle = g.color;
      ctx.beginPath(); ctx.moveTo(0,-g.size*pulse); ctx.lineTo(g.size*0.6*pulse,0); ctx.lineTo(0,g.size*pulse); ctx.lineTo(-g.size*0.6*pulse,0); ctx.closePath(); ctx.fill();
      // Sparkle
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-1,-g.size*0.3,1.5,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  drawParticles() {
    for (const p of this.particles) {
      const a = clamp(p.life/p.maxLife,0,1);
      if (p.type==='warning') {
        ctx.fillStyle=`rgba(255,68,0,${a*0.15})`;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*(1-a*0.5),0,Math.PI*2); ctx.fill();
        ctx.strokeStyle=`rgba(255,68,0,${a*0.4})`; ctx.lineWidth=2; ctx.stroke();
        continue;
      }
      ctx.globalAlpha=a; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  drawDmgNums() {
    for (const d of this.damageNumbers) {
      const a=d.life/d.maxLife, sc=1+(1-a)*0.5;
      ctx.save(); ctx.translate(d.x,d.y); ctx.scale(sc,sc);
      ctx.globalAlpha=a;
      ctx.font='bold 15px Orbitron, sans-serif'; ctx.textAlign='center';
      ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.strokeText(d.value,0,0);
      ctx.fillStyle=d.color; ctx.fillText(d.value,0,0);
      ctx.restore();
    }
    ctx.globalAlpha=1;
  }
}

// ---- Resize ----
function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

// ---- Input ----
window.addEventListener('keydown', e=>{
  if(!game) return;
  game.keys[e.code]=true;
  if(e.code==='Space') {
    e.preventDefault();
    if(game.state==='playing') game.fireUltimate();
  }
  if(e.code==='Escape') {
    if(game.state==='playing') {
      game.state='paused';
      document.getElementById('pause-screen').classList.add('active');
    } else if(game.state==='paused') {
      game.state='playing';
      document.getElementById('pause-screen').classList.remove('active');
    }
  }
});
window.addEventListener('keyup', e=>{ if(game) game.keys[e.code]=false; });
let touchId=null;
function tStart(e) {
  if(!game||game.state!=='playing')return;
  const t=e.changedTouches[0]; touchId=t.identifier;
  game.touch.active=true; game.touch.sx=t.clientX; game.touch.sy=t.clientY; game.touch.dx=0; game.touch.dy=0;
}
function tMove(e) {
  if(!game||touchId===null)return; e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===touchId) {
    const dx=t.clientX-game.touch.sx, dy=t.clientY-game.touch.sy, len=Math.hypot(dx,dy);
    if(len>0){const c=Math.min(len,50);game.touch.dx=(dx/len)*(c/50);game.touch.dy=(dy/len)*(c/50);}
  }
}
function tEnd(e) {
  if(!game)return;
  for(const t of e.changedTouches) if(t.identifier===touchId) { touchId=null; game.touch.active=false; game.touch.dx=0; game.touch.dy=0; }
}
document.addEventListener('touchstart',e=>{if(game&&game.state==='playing')tStart(e);},{passive:false});
document.addEventListener('touchmove',tMove,{passive:false});
document.addEventListener('touchend',tEnd);

// ---- Name Screen ----
function checkUser() {
  const user = Storage.getUser();
  if (!user) {
    document.getElementById('name-screen').classList.add('active');
    document.getElementById('title-screen').classList.add('hidden');
  } else {
    document.getElementById('name-screen').classList.remove('active');
    document.getElementById('title-screen').classList.remove('hidden');
    updateTitleScreen();
  }
}
document.getElementById('name-submit').onclick = () => {
  const val = document.getElementById('name-input').value.trim();
  if (val) {
    Storage.setUser(val);
    document.getElementById('name-screen').classList.remove('active');
    document.getElementById('title-screen').classList.remove('hidden');
    updateTitleScreen();
  }
};
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('name-submit').click();
});
checkUser();

// ---- Buttons ----
document.getElementById('start-btn').onclick = () => { game=new Game(); game.start(); };
document.getElementById('retry-btn').onclick = () => { game.start(); };
document.getElementById('victory-retry-btn').onclick = () => { game.start(); };
document.getElementById('next-stage-btn').onclick = () => {
  document.getElementById('stage-clear').classList.remove('active');
  game.startStage(game.currentStage + 1);
};
// Home buttons
document.getElementById('go-home-btn').onclick = goHome;
document.getElementById('vic-home-btn').onclick = goHome;
document.getElementById('pause-home').onclick = goHome;
// Ranking
document.getElementById('btn-ranking').onclick = showRanking;
document.getElementById('ranking-close').onclick = () => document.getElementById('ranking-screen').classList.remove('active');
// Change name
document.getElementById('btn-changename').onclick = () => {
  document.getElementById('name-input').value = Storage.getUser();
  document.getElementById('name-screen').classList.add('active');
  document.getElementById('title-screen').classList.add('hidden');
};
// Pause
document.getElementById('pause-resume').onclick = () => {
  document.getElementById('pause-screen').classList.remove('active');
  if (game) game.state = 'playing';
};
// Ultimate button (mobile)
document.getElementById('ultimate-btn').onclick = () => { if(game && game.state==='playing') game.fireUltimate(); };
// Share buttons
document.getElementById('share-x-go').onclick = () => shareToX('gameover');
document.getElementById('share-copy-go').onclick = () => copyResult('gameover');
document.getElementById('share-x-vic').onclick = () => shareToX('victory');
document.getElementById('share-copy-vic').onclick = () => copyResult('victory');
document.getElementById('share-x-clear').onclick = () => shareToX('clear');

// ---- Loop ----
let lastTs=performance.now();
function loop() {
  requestAnimationFrame(loop);
  tick();
}
function tick() {
  if(!game)return;
  const now=performance.now();
  const dt=Math.min((now-lastTs)/1000,0.05);
  lastTs=now;
  if(dt>0.001){game.update(dt);game.render();}
}
requestAnimationFrame(loop);
// Fallback for background tabs where rAF may not fire
setInterval(tick, 16);

// ---- Title BG ----
const tbg=document.getElementById('title-bg');
const tbx=tbg.getContext('2d');
tbg.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;z-index:-1;';
const tParts=[];
function initTitle(){
  tbg.width=window.innerWidth;tbg.height=window.innerHeight;
  for(let i=0;i<80;i++) tParts.push({x:Math.random()*tbg.width,y:Math.random()*tbg.height,s:Math.random()*2.5+0.5,sp:Math.random()*0.4+0.15,a:Math.random()*0.5+0.1,c:['#ff00ff','#8800ff','#00ffff','#4400ff'][randInt(0,3)]});
}
initTitle();
function drawTitle(){
  if(document.getElementById('title-screen').classList.contains('hidden'))return;
  requestAnimationFrame(drawTitle);
  tbx.clearRect(0,0,tbg.width,tbg.height);
  for(const p of tParts){
    p.y-=p.sp; if(p.y<-10){p.y=tbg.height+10;p.x=Math.random()*tbg.width;}
    tbx.fillStyle=p.c; tbx.globalAlpha=p.a;
    tbx.beginPath();tbx.arc(p.x,p.y,p.s,0,Math.PI*2);tbx.fill();
  }
  tbx.globalAlpha=1;
}
drawTitle();
</script>

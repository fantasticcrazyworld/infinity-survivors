<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Infinity Survivors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  font-family: 'Rajdhani', 'Segoe UI', sans-serif;
}
canvas { display: block; }

/* XP Bar */
#xp-bar-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 6px;
  background: rgba(0,0,0,0.6); z-index: 20;
}
#xp-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #00ccff, #00ffcc, #88ffaa);
  box-shadow: 0 0 10px #00ffcc88;
  transition: width 0.2s;
}

/* HUD */
#hud {
  position: fixed; top: 12px; left: 12px;
  color: white; font-size: 15px; font-weight: 600;
  text-shadow: 0 0 8px rgba(0,0,0,0.8); z-index: 20; line-height: 1.7;
  font-family: 'Orbitron', sans-serif;
}
#hud-right {
  position: fixed; top: 12px; right: 12px;
  color: white; font-size: 15px; font-weight: 600;
  text-shadow: 0 0 8px rgba(0,0,0,0.8); z-index: 20;
  text-align: right; line-height: 1.7;
  font-family: 'Orbitron', sans-serif;
}

/* Stage/Objectives HUD */
#stage-hud {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  text-align: center; z-index: 20; pointer-events: none;
}
#stage-name {
  color: #ffdd00; font-size: 14px; font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  text-shadow: 0 0 10px #ffdd0066;
  letter-spacing: 2px;
}
#objectives {
  margin-top: 4px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
}
.obj-item {
  font-size: 12px; color: #aaa; padding: 2px 10px;
  background: rgba(0,0,0,0.5); border-radius: 10px;
  border: 1px solid #333; transition: all 0.3s;
  font-family: 'Rajdhani', sans-serif; font-weight: 600;
}
.obj-item.completed { color: #44ff44; border-color: #44ff44; text-decoration: line-through; }

/* HP Bar */
#hp-bar-container {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  width: 280px; max-width: 75vw; height: 18px;
  background: rgba(0,0,0,0.7); border: 1px solid #444;
  border-radius: 9px; overflow: hidden; z-index: 20;
}
#hp-bar {
  height: 100%; width: 100%;
  background: linear-gradient(to bottom, #ff5555, #cc2222);
  transition: width 0.3s; border-radius: 8px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
}
#hp-text {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: white; font-size: 11px; font-weight: 700;
  text-shadow: 1px 1px 2px black;
  font-family: 'Orbitron', sans-serif;
}

/* Boss HP */
#boss-hp-container {
  display: none; position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
  width: 400px; max-width: 85vw; z-index: 25; text-align: center;
}
#boss-hp-container.active { display: block; }
#boss-name {
  color: #ff4444; font-size: 16px; font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  text-shadow: 0 0 15px #ff000066;
  margin-bottom: 4px; letter-spacing: 3px;
}
#boss-hp-bar-outer {
  width: 100%; height: 14px;
  background: rgba(0,0,0,0.8); border: 1px solid #ff444488;
  border-radius: 7px; overflow: hidden;
}
#boss-hp-bar {
  height: 100%; width: 100%;
  background: linear-gradient(to bottom, #ff6666, #cc0000);
  transition: width 0.2s; border-radius: 6px;
  box-shadow: 0 0 10px #ff000044;
}

/* Weapon inventory */
#weapon-inventory {
  position: fixed; bottom: 54px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 5px; z-index: 20;
}
.weapon-slot {
  width: 34px; height: 34px;
  background: rgba(0,0,0,0.7); border: 1px solid #555;
  border-radius: 6px; display: flex; justify-content: center; align-items: center;
  font-size: 16px; position: relative;
}
.weapon-slot .wlvl {
  position: absolute; bottom: -2px; right: -2px;
  background: #ffdd00; color: #000;
  font-size: 8px; font-weight: bold; border-radius: 3px;
  padding: 0 3px; line-height: 13px;
}

/* Level Up Screen */
#levelup-screen {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 100;
  justify-content: center; align-items: center; flex-direction: column;
}
#levelup-screen.active { display: flex; }
#levelup-title {
  color: #ffdd00; font-size: 42px; font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  text-shadow: 0 0 30px #ffdd0066, 0 0 60px #ffdd0033;
  animation: pulse 0.5s ease-in-out infinite alternate;
  margin-bottom: 8px;
}
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.04); } }
#levelup-subtitle {
  color: #888; font-size: 16px; margin-bottom: 28px;
  font-family: 'Rajdhani', sans-serif;
}
#levelup-choices {
  display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; padding: 0 20px;
}
.choice-card {
  background: linear-gradient(145deg, #12122a, #1a1a3e);
  border: 2px solid #333; border-radius: 14px;
  padding: 18px 16px; width: 190px; cursor: pointer;
  transition: all 0.25s; text-align: center;
  position: relative; overflow: hidden;
}
.choice-card::before {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(255,221,0,0.05) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.3s;
}
.choice-card:hover::before { opacity: 1; }
.choice-card:hover {
  border-color: #ffdd00; transform: translateY(-4px) scale(1.02);
  box-shadow: 0 8px 25px rgba(255,221,0,0.2);
}
.choice-icon { font-size: 36px; margin-bottom: 8px; }
.choice-name { color: white; font-size: 16px; font-weight: 700; margin-bottom: 4px; font-family: 'Orbitron', sans-serif; }
.choice-level { color: #ffdd00; font-size: 11px; margin-bottom: 6px; font-family: 'Orbitron', sans-serif; }
.choice-desc { color: #999; font-size: 13px; line-height: 1.4; }

/* Title Screen */
#title-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 200; display: flex; justify-content: center;
  align-items: center; flex-direction: column;
  background: radial-gradient(ellipse at 50% 40%, #1a0a2e 0%, #0a0510 50%, #000 100%);
}
#title-screen.hidden { display: none; }
#game-title {
  font-size: 56px; font-weight: 900; color: #fff;
  font-family: 'Orbitron', sans-serif;
  text-shadow: 0 0 40px #ff00ff88, 0 0 80px #8800ff44;
  margin-bottom: 8px; animation: titleGlow 3s ease-in-out infinite alternate;
  text-align: center; padding: 0 20px; letter-spacing: 4px;
}
@keyframes titleGlow {
  0% { text-shadow: 0 0 40px #ff00ff88, 0 0 80px #8800ff44; filter: brightness(1); }
  50% { text-shadow: 0 0 50px #00ffff88, 0 0 100px #0088ff44; filter: brightness(1.1); }
  100% { text-shadow: 0 0 40px #ff00ff88, 0 0 80px #8800ff44; filter: brightness(1); }
}
#title-subtitle {
  color: #666; font-size: 16px; margin-bottom: 45px;
  font-family: 'Rajdhani', sans-serif; letter-spacing: 3px;
}
#start-btn {
  background: linear-gradient(135deg, #ff00ff, #7700ff);
  color: white; border: none; padding: 16px 55px;
  font-size: 22px; font-weight: 700; border-radius: 50px;
  cursor: pointer; transition: all 0.3s;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
  animation: btnPulse 2s ease-in-out infinite;
}
#start-btn:hover { transform: scale(1.08); box-shadow: 0 0 40px rgba(255,0,255,0.5); }
@keyframes btnPulse {
  0%, 100% { box-shadow: 0 0 15px rgba(255,0,255,0.3); }
  50% { box-shadow: 0 0 35px rgba(255,0,255,0.5); }
}
#controls-hint {
  color: #555; font-size: 13px; margin-top: 30px;
  text-align: center; line-height: 1.8; font-family: 'Rajdhani', sans-serif;
}

/* Stage Intro Overlay */
#stage-intro {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 150;
  background: rgba(0,0,0,0.9);
  justify-content: center; align-items: center; flex-direction: column;
}
#stage-intro.active { display: flex; }
#stage-intro-number {
  font-size: 20px; color: #888; font-family: 'Orbitron', sans-serif;
  letter-spacing: 5px; margin-bottom: 8px;
  animation: fadeSlideUp 0.5s ease-out;
}
#stage-intro-name {
  font-size: 48px; font-weight: 900; font-family: 'Orbitron', sans-serif;
  letter-spacing: 4px; margin-bottom: 16px;
  animation: fadeSlideUp 0.6s ease-out;
}
#stage-intro-goal {
  font-size: 16px; color: #aaa; font-family: 'Rajdhani', sans-serif;
  animation: fadeSlideUp 0.8s ease-out;
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Stage Clear */
#stage-clear {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 150;
  background: rgba(0,0,0,0.85);
  justify-content: center; align-items: center; flex-direction: column;
}
#stage-clear.active { display: flex; }
#clear-title {
  font-size: 44px; font-weight: 900; color: #ffdd00;
  font-family: 'Orbitron', sans-serif;
  text-shadow: 0 0 30px #ffdd0066;
  animation: pulse 0.5s ease-in-out infinite alternate;
  margin-bottom: 16px;
}
#clear-stats {
  color: #ccc; font-size: 18px; line-height: 2; text-align: center; margin-bottom: 30px;
  font-family: 'Rajdhani', sans-serif;
}
#next-stage-btn {
  background: linear-gradient(135deg, #ffdd00, #ff8800);
  color: #111; border: none; padding: 15px 50px;
  font-size: 20px; font-weight: 700; border-radius: 50px;
  cursor: pointer; transition: all 0.3s;
  font-family: 'Orbitron', sans-serif; letter-spacing: 2px;
}
#next-stage-btn:hover { transform: scale(1.08); box-shadow: 0 0 30px rgba(255,200,0,0.5); }

/* Game Over */
#gameover-screen {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.92); z-index: 200;
  justify-content: center; align-items: center; flex-direction: column;
}
#gameover-screen.active { display: flex; }
#gameover-title {
  font-size: 48px; font-weight: 900; color: #ff4444;
  font-family: 'Orbitron', sans-serif;
  text-shadow: 0 0 30px #ff000066; margin-bottom: 20px;
}
#gameover-stats {
  color: #ccc; font-size: 18px; line-height: 2; text-align: center; margin-bottom: 30px;
  font-family: 'Rajdhani', sans-serif;
}
#retry-btn {
  background: linear-gradient(135deg, #ff4444, #cc0000);
  color: white; border: none; padding: 15px 50px;
  font-size: 20px; font-weight: 700; border-radius: 50px;
  cursor: pointer; transition: all 0.3s;
  font-family: 'Orbitron', sans-serif;
}
#retry-btn:hover { transform: scale(1.08); box-shadow: 0 0 25px rgba(255,0,0,0.4); }

/* Victory Screen */
#victory-screen {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, #1a1a00 0%, #000 100%);
  z-index: 200; justify-content: center; align-items: center; flex-direction: column;
}
#victory-screen.active { display: flex; }
#victory-title {
  font-size: 52px; font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(135deg, #ffdd00, #ff8800, #ffdd00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none; margin-bottom: 16px;
  animation: pulse 0.6s ease-in-out infinite alternate;
}
#victory-stats {
  color: #ccc; font-size: 18px; line-height: 2; text-align: center; margin-bottom: 30px;
}
#victory-retry-btn {
  background: linear-gradient(135deg, #ffdd00, #ff8800);
  color: #111; border: none; padding: 15px 50px;
  font-size: 20px; font-weight: 700; border-radius: 50px;
  cursor: pointer; transition: all 0.3s;
  font-family: 'Orbitron', sans-serif;
}
#victory-retry-btn:hover { transform: scale(1.08); }

/* Screen flash */
#screen-flash {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 90; opacity: 0;
  transition: opacity 0.1s;
}

/* Share buttons */
.share-btn {
  background: linear-gradient(135deg, #1da1f2, #0d8ecf);
  color: white; border: none; padding: 12px 30px;
  font-size: 16px; font-weight: 700; border-radius: 50px;
  cursor: pointer; transition: all 0.3s;
  font-family: 'Orbitron', sans-serif; letter-spacing: 1px;
  margin: 6px;
}
.share-btn:hover { transform: scale(1.06); box-shadow: 0 0 20px rgba(29,161,242,0.4); }
.share-btn.x-btn { background: linear-gradient(135deg, #333, #111); }
.share-btn.x-btn:hover { box-shadow: 0 0 20px rgba(255,255,255,0.2); }
.share-btn.copy-btn { background: linear-gradient(135deg, #44bb44, #228822); }
.share-btn.copy-btn:hover { box-shadow: 0 0 20px rgba(68,187,68,0.4); }
.share-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
/* Combo display */
#combo-display {
  position: fixed; right: 15px; top: 50%; transform: translateY(-50%);
  z-index: 25; pointer-events: none; text-align: right;
}
#combo-count {
  font-size: 48px; font-weight: 900; font-family: 'Orbitron', sans-serif;
  color: #ffdd00; text-shadow: 0 0 20px #ffdd0066, 0 0 40px #ff880033;
  transition: transform 0.1s; opacity: 0;
}
#combo-count.active { opacity: 1; }
#combo-count.pop { transform: scale(1.3); }
#combo-label {
  font-size: 14px; font-weight: 700; font-family: 'Orbitron', sans-serif;
  color: #ffaa00; letter-spacing: 3px; opacity: 0;
}
#combo-label.active { opacity: 1; }

/* Kill announcement */
#announcement {
  position: fixed; top: 35%; left: 50%; transform: translate(-50%,-50%);
  z-index: 30; pointer-events: none; text-align: center;
  font-family: 'Orbitron', sans-serif; font-weight: 900;
  font-size: 36px; opacity: 0;
  transition: opacity 0.15s, transform 0.15s;
}
#announcement.show {
  opacity: 1; transform: translate(-50%,-50%) scale(1.2);
}

#copy-toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #44bb44; color: white; padding: 10px 24px; border-radius: 20px;
  font-family: 'Orbitron', sans-serif; font-size: 13px;
  opacity: 0; transition: opacity 0.3s; z-index: 300; pointer-events: none;
}
#copy-toast.show { opacity: 1; }

/* Home / secondary buttons */
.home-btn {
  background: transparent; color: #888; border: 1px solid #555;
  padding: 10px 30px; font-size: 14px; font-weight: 600;
  border-radius: 50px; cursor: pointer; transition: all 0.3s;
  font-family: 'Orbitron', sans-serif; margin-top: 8px;
}
.home-btn:hover { color: #fff; border-color: #aaa; }

/* Name input screen */
#name-screen {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at 50% 40%, #1a0a2e 0%, #000 100%);
  z-index: 210; justify-content: center; align-items: center; flex-direction: column;
}
#name-screen.active { display: flex; }
#name-screen h2 {
  color: #ffdd00; font-size: 24px; font-family: 'Orbitron', sans-serif;
  margin-bottom: 20px; text-shadow: 0 0 20px #ffdd0044;
}
#name-input {
  background: #111; border: 2px solid #444; color: #fff;
  padding: 12px 20px; font-size: 20px; border-radius: 10px;
  text-align: center; width: 250px; font-family: 'Orbitron', sans-serif;
  outline: none; transition: border-color 0.3s;
}
#name-input:focus { border-color: #ffdd00; }
#name-input::placeholder { color: #555; }
#name-submit {
  background: linear-gradient(135deg, #ffdd00, #ff8800);
  color: #111; border: none; padding: 12px 40px;
  font-size: 18px; font-weight: 700; border-radius: 50px;
  cursor: pointer; margin-top: 20px; font-family: 'Orbitron', sans-serif;
  transition: all 0.3s;
}
#name-submit:hover { transform: scale(1.06); }

/* Ranking screen */
#ranking-screen {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95); z-index: 205;
  justify-content: center; align-items: center; flex-direction: column;
}
#ranking-screen.active { display: flex; }
#ranking-title {
  color: #ffdd00; font-size: 28px; font-weight: 900;
  font-family: 'Orbitron', sans-serif; margin-bottom: 20px;
  text-shadow: 0 0 20px #ffdd0044;
}
#ranking-list {
  width: 340px; max-width: 90vw; max-height: 50vh; overflow-y: auto;
}
.rank-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 14px; border-bottom: 1px solid #222;
  font-family: 'Rajdhani', sans-serif; font-size: 15px;
}
.rank-row:nth-child(1) { color: #ffdd00; font-size: 17px; font-weight: 700; }
.rank-row:nth-child(2) { color: #cccccc; }
.rank-row:nth-child(3) { color: #cc8844; }
.rank-row .rank-pos { color: #888; width: 30px; font-family: 'Orbitron', sans-serif; font-size: 13px; }
.rank-row .rank-name { flex: 1; color: inherit; margin: 0 10px; }
.rank-row .rank-score { color: inherit; font-family: 'Orbitron', sans-serif; font-size: 13px; }
.rank-row .rank-detail { color: #666; font-size: 12px; margin-left: 8px; }
#ranking-close {
  margin-top: 20px;
}

/* Pause menu */
#pause-screen {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.8); z-index: 110;
  justify-content: center; align-items: center; flex-direction: column;
}
#pause-screen.active { display: flex; }
#pause-title {
  color: #fff; font-size: 36px; font-weight: 900;
  font-family: 'Orbitron', sans-serif; margin-bottom: 30px;
}
.pause-btn {
  background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #555;
  padding: 12px 40px; font-size: 16px; font-weight: 600; border-radius: 10px;
  cursor: pointer; margin: 6px; width: 200px; text-align: center;
  font-family: 'Orbitron', sans-serif; transition: all 0.2s;
}
.pause-btn:hover { background: rgba(255,255,255,0.2); border-color: #aaa; }

/* Title screen additions */
#title-best { color: #888; font-size: 14px; margin-top: 15px; font-family: 'Orbitron', sans-serif; }
#title-user { color: #ffdd00; font-size: 13px; margin-bottom: 5px; font-family: 'Orbitron', sans-serif; }
#title-buttons { display: flex; gap: 10px; margin-top: 15px; }
.title-sub-btn {
  background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid #444;
  padding: 8px 20px; font-size: 13px; border-radius: 20px;
  cursor: pointer; font-family: 'Orbitron', sans-serif; transition: all 0.2s;
}
.title-sub-btn:hover { color: #fff; border-color: #888; }

/* SP Gauge */
#sp-bar-container {
  position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%);
  width: 180px; max-width: 50vw; height: 10px;
  background: rgba(0,0,0,0.6); border: 1px solid #555;
  border-radius: 5px; overflow: hidden; z-index: 20;
}
#sp-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #ff00ff, #ffdd00);
  transition: width 0.3s; border-radius: 4px;
}
#sp-bar.ready {
  background: linear-gradient(90deg, #ffdd00, #ff8800, #ffdd00);
  animation: spReady 0.5s ease-in-out infinite alternate;
}
@keyframes spReady {
  from { box-shadow: 0 0 5px #ffdd00; }
  to { box-shadow: 0 0 15px #ffdd00, 0 0 30px #ff880066; }
}
#sp-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 8px; font-family: 'Orbitron', sans-serif;
  color: #fff; font-weight: 700; text-shadow: 0 0 3px #000;
  pointer-events: none;
}
#ultimate-btn {
  position: fixed; bottom: 100px; right: 15px;
  width: 56px; height: 56px; border-radius: 50%;
  background: radial-gradient(circle, #ffdd00, #ff8800);
  border: 3px solid #fff; color: #111;
  font-size: 11px; font-weight: 900; font-family: 'Orbitron', sans-serif;
  cursor: pointer; z-index: 21;
  display: none; transition: all 0.2s;
  box-shadow: 0 0 20px #ffdd0066;
  animation: ultPulse 0.8s ease-in-out infinite alternate;
}
#ultimate-btn:active { transform: scale(0.9); }
@keyframes ultPulse {
  from { box-shadow: 0 0 10px #ffdd0044; }
  to { box-shadow: 0 0 30px #ffdd00aa, 0 0 50px #ff880044; }
}
#ultimate-btn.hidden { display: none; }
#sp-hint {
  position: fixed; bottom: 108px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: #ffdd00; font-family: 'Orbitron', sans-serif;
  z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.3s;
  text-shadow: 0 0 8px #ffdd0044;
}
#sp-hint.show { opacity: 1; animation: pulse 0.5s ease-in-out infinite alternate; }

<script>
// ============================================================
// INFINITY SURVIVORS v2 - Stage System + Design Overhaul
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---- Audio ----
class AudioSystem {
  constructor() { this.ctx = null; this.on = false; }
  init() {
    if (this.on) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); this.on = true; } catch(e) {}
  }
  play(type, vol = 0.3) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.connect(g); g.connect(this.ctx.destination); g.gain.value = vol;
    const sounds = {
      hit:       () => { o.type='square'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(80,t+0.1); g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t); o.stop(t+0.1); },
      kill:      () => { o.type='sine'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(800,t+0.1); g.gain.exponentialRampToValueAtTime(0.01,t+0.15); o.start(t); o.stop(t+0.15); },
      xp:        () => { o.type='sine'; o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.08); g.gain.value=0.1; g.gain.exponentialRampToValueAtTime(0.01,t+0.08); o.start(t); o.stop(t+0.08); },
      levelup:   () => { o.type='sine'; o.frequency.setValueAtTime(400,t); o.frequency.setValueAtTime(500,t+0.1); o.frequency.setValueAtTime(600,t+0.2); o.frequency.setValueAtTime(800,t+0.3); g.gain.exponentialRampToValueAtTime(0.01,t+0.5); o.start(t); o.stop(t+0.5); },
      playerHit: () => { o.type='sawtooth'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(50,t+0.2); g.gain.exponentialRampToValueAtTime(0.01,t+0.2); o.start(t); o.stop(t+0.2); },
      lightning: () => { o.type='sawtooth'; o.frequency.setValueAtTime(100,t); o.frequency.exponentialRampToValueAtTime(2000,t+0.05); o.frequency.exponentialRampToValueAtTime(50,t+0.15); g.gain.exponentialRampToValueAtTime(0.01,t+0.15); o.start(t); o.stop(t+0.15); },
      explosion: () => { o.type='sawtooth'; o.frequency.setValueAtTime(100,t); o.frequency.exponentialRampToValueAtTime(30,t+0.3); g.gain.exponentialRampToValueAtTime(0.01,t+0.3); o.start(t); o.stop(t+0.3); },
      boss:      () => { o.type='sawtooth'; o.frequency.setValueAtTime(80,t); o.frequency.setValueAtTime(60,t+0.3); o.frequency.setValueAtTime(80,t+0.6); o.frequency.setValueAtTime(40,t+0.9); g.gain.exponentialRampToValueAtTime(0.01,t+1.2); o.start(t); o.stop(t+1.2); },
      clear:     () => { o.type='sine'; o.frequency.setValueAtTime(523,t); o.frequency.setValueAtTime(659,t+0.15); o.frequency.setValueAtTime(784,t+0.3); o.frequency.setValueAtTime(1047,t+0.45); g.gain.exponentialRampToValueAtTime(0.01,t+0.8); o.start(t); o.stop(t+0.8); },
      bossIntro: () => { o.type='sawtooth'; g.gain.value=0.4; o.frequency.setValueAtTime(60,t); o.frequency.setValueAtTime(50,t+0.5); o.frequency.setValueAtTime(40,t+1); o.frequency.setValueAtTime(80,t+1.5); g.gain.exponentialRampToValueAtTime(0.01,t+2); o.start(t); o.stop(t+2); },
    };
    if (sounds[type]) sounds[type]();
  }
}
const audio = new AudioSystem();

// ---- User & Ranking System ----
const Storage = {
  getUser() { return localStorage.getItem('is_username') || ''; },
  setUser(n) { localStorage.setItem('is_username', n); },
  getRankings() {
    try { return JSON.parse(localStorage.getItem('is_rankings') || '[]'); } catch(e) { return []; }
  },
  addScore(entry) {
    const r = this.getRankings();
    r.push(entry);
    r.sort((a,b) => b.score - a.score);
    localStorage.setItem('is_rankings', JSON.stringify(r.slice(0, 20)));
  },
  getBest() {
    const r = this.getRankings();
    return r.length ? r[0] : null;
  }
};

function calcScore(g) {
  return g.totalKills * 10 + Math.floor(g.time) * 5 + g.player.level * 50 + (g.currentStage) * 500 + g.maxCombo * 3;
}

function showRanking() {
  const list = document.getElementById('ranking-list');
  const ranks = Storage.getRankings();
  list.innerHTML = '';
  if (ranks.length === 0) {
    list.innerHTML = '<div style="color:#666;text-align:center;padding:20px;font-family:Rajdhani,sans-serif;">No records yet. Play to set a score!</div>';
  } else {
    ranks.forEach((r, i) => {
      const row = document.createElement('div');
      row.className = 'rank-row';
      const medal = i===0?'\u{1F947}':i===1?'\u{1F948}':i===2?'\u{1F949}':'';
      row.innerHTML = `<span class="rank-pos">${medal||('#'+(i+1))}</span><span class="rank-name">${r.name}</span><span class="rank-score">${r.score}</span><span class="rank-detail">S${r.stage} ${r.time}</span>`;
      list.appendChild(row);
    });
  }
  document.getElementById('ranking-screen').classList.add('active');
}

function goHome() {
  // Hide all screens, show title
  ['gameover-screen','victory-screen','stage-clear','pause-screen','ranking-screen','levelup-screen','stage-intro','boss-hp-container'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById('title-screen').classList.remove('hidden');
  updateTitleScreen();
  game = null;
}

function updateTitleScreen() {
  const user = Storage.getUser();
  document.getElementById('title-user').textContent = user ? `Welcome, ${user}` : '';
  const best = Storage.getBest();
  document.getElementById('title-best').textContent = best ? `Best: ${best.score} pts (${best.name})` : '';
}

// ---- Performance ----
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
const MAX_PARTICLES = isMobile ? 150 : 500;
const MAX_ENEMIES = isMobile ? 150 : 300;
const MAX_DMGNUMS = isMobile ? 15 : 40;

// ---- Utility ----
function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }
function angle(a,b) { return Math.atan2(b.y-a.y, b.x-a.x); }
function rand(a,b) { return Math.random()*(b-a)+a; }
function randInt(a,b) { return Math.floor(rand(a,b+1)); }
function lerp(a,b,t) { return a+(b-a)*t; }
function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }
function addParticle(arr, p) { if(arr.length < MAX_PARTICLES) arr.push(p); }
function screenFlash(color, dur=200) {
  const el = document.getElementById('screen-flash');
  el.style.background = color;
  el.style.opacity = '1';
  el.style.transition = 'opacity 0.05s';
  setTimeout(() => { el.style.transition = `opacity ${dur}ms`; el.style.opacity = '0'; }, 50);
}

// ---- Vibration ----
function vib(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
}

// ---- Share System ----
function getShareText(type) {
  if (!game) return '';
  const p = game.player;
  const weapons = Object.keys(p.weapons).map(k => WEAPON_DEFS[k].icon).join('');
  const bar = (n, max, filled='🟩', empty='⬛') => {
    const count = Math.round(n/max*10);
    return filled.repeat(count) + empty.repeat(10-count);
  };
  const stageBar = bar(game.currentStage+1, 5, '🟪', '⬜');

  if (type === 'gameover') {
    return `☠️ INFINITY SURVIVORS ☠️

⚔️ Stage: ${game.stageDef.name}
⏱ Time: ${game.formatTime(game.time)}
💀 Kills: ${game.totalKills}
⭐ Level: ${p.level}
🗡 ${weapons}

${stageBar}

Can you survive longer? 🔥
#InfinitySurvivors`;
  } else if (type === 'victory') {
    return `🏆 INFINITY SURVIVORS - CLEARED! 🏆

⏱ Time: ${game.formatTime(game.time)}
💀 Kills: ${game.totalKills}
⭐ Level: ${p.level}
🗡 ${weapons}

${bar(5,5,'🟨','⬜')} ALL STAGES CLEAR!

I conquered the Void Emperor! 👑
#InfinitySurvivors`;
  } else {
    return `✨ STAGE ${game.stageDef.id} CLEAR! ✨

🏰 ${game.stageDef.name}
💀 Kills: ${game.stageKills}
⭐ Level: ${p.level}
🗡 ${weapons}

${stageBar}

#InfinitySurvivors`;
  }
}

function shareToX(type) {
  const text = encodeURIComponent(getShareText(type));
  window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
}

function copyResult(type) {
  const text = getShareText(type);
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('copy-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }).catch(() => {});
}

// ---- Constants ----
const WORLD_SIZE = 3000;
const TILE = 80;

// ---- Stage Definitions ----
const STAGES = [
  {

  {

  }
];

// ---- Weapon Defs ----
const WEAPON_DEFS = {
  magicBullet: { name:'Magic Bullet', icon:'\u{1F52E}', color:'#aa66ff', desc:'Homing bullets at nearest enemy', baseCooldown:800, baseDamage:15, levelDesc:lv=>`Lv.${lv}: ${lv} bullets, ${15+lv*5} dmg` },
  fireCircle: { name:'Fire Circle', icon:'\u{1F525}', color:'#ff6600', desc:'Orbiting flames around you', baseCooldown:0, baseDamage:10, levelDesc:lv=>`Lv.${lv}: ${2+lv} flames, ${10+lv*3} dmg` },
  lightning:   { name:'Lightning', icon:'\u26A1', color:'#ffff00', desc:'Strikes random nearby enemies', baseCooldown:1200, baseDamage:30, levelDesc:lv=>`Lv.${lv}: ${lv} strikes, ${30+lv*10} dmg` },
  shuriken:    { name:'Shuriken', icon:'\u{1F4A0}', color:'#88ccff', desc:'Fast piercing projectiles', baseCooldown:600, baseDamage:12, levelDesc:lv=>`Lv.${lv}: ${lv} shurikens, pierce ${lv}` },
  frostNova:   { name:'Frost Nova', icon:'\u2744\uFE0F', color:'#66ddff', desc:'Freezing explosion around you', baseCooldown:2500, baseDamage:20, levelDesc:lv=>`Lv.${lv}: range ${80+lv*20}, slow ${1+lv*0.5}s` },
  meteor:      { name:'Meteor', icon:'\u2604\uFE0F', color:'#ff4400', desc:'Meteors fall on enemy positions', baseCooldown:2000, baseDamage:50, levelDesc:lv=>`Lv.${lv}: ${lv} meteors, ${50+lv*15} dmg` }
};
const PASSIVE_DEFS = {
  speed:    { name:'Speed Boost', icon:'\u{1F45F}', color:'#44ff44', desc:'+15% movement speed', maxLv:5 },
  maxHp:    { name:'Vitality', icon:'\u2764\uFE0F', color:'#ff4444', desc:'+20 max HP & heal', maxLv:5 },
  magnet:   { name:'Magnet', icon:'\u{1F9F2}', color:'#ff88ff', desc:'+40% pickup range', maxLv:5 },
